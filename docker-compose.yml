services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hriv
      POSTGRES_USER: hriv
      POSTGRES_PASSWORD: hriv
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hriv"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - 8000:8000
    volumes:
      - ./backend/app:/app/app
      - image_data:/data
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://hriv:hriv@db:5432/hriv
      - REDIS_URL=redis://redis:6379
      - SOURCE_IMAGES_DIR=/data/source_images
      - TILES_DIR=/data/tiles
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()",
        ]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend_poetry:
    build:
      context: ./backend
      target: poetry-tools
    volumes:
      - ./backend:/app
    working_dir: /app
    entrypoint: ["/opt/poetry-venv/bin/poetry"]
    profiles:
      - tools

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - 5173:5173
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
    environment:
      - NODE_ENV=development
      - VITE_APP_VERSION=${APP_VERSION:-dev}
    depends_on:
      backend:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      target: dev
    command: ["arq", "app.worker.WorkerSettings"]
    volumes:
      - ./backend/app:/app/app
      - image_data:/data
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://hriv:hriv@db:5432/hriv
      - REDIS_URL=redis://redis:6379
      - SOURCE_IMAGES_DIR=/data/source_images
      - TILES_DIR=/data/tiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 5s

  backup:
    build:
      context: ./backup
    volumes:
      - image_data:/data
      - backup_data:/backups
    environment:
      - DATABASE_URL=postgresql://hriv:hriv@db:5432/hriv
      - DATA_DIR=/data
      - BACKUP_CRON_SCHEDULE=0 2 * * *
      - BACKUP_RETENTION_COUNT=30
      # Azure Blob Storage – uncomment and fill in to enable cloud storage:
      # - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=...;AccountKey=...;EndpointSuffix=core.windows.net
      # - AZURE_STORAGE_CONTAINER=hriv-backups
      # - AZURE_BLOB_PREFIX=hriv-backups
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - backup

volumes:
  pgdata:
  image_data:
  redisdata:
  backup_data:
