services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: corgi
      POSTGRES_USER: corgi
      POSTGRES_PASSWORD: corgi
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corgi"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - 8000:8000
    volumes:
      - ./backend/app:/app/app
      - image_data:/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://corgi:corgi@db:5432/corgi
      - SOURCE_IMAGES_DIR=/data/source_images
      - TILES_DIR=/data/tiles
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - 5173:5173
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backup:
    build:
      context: ./backup
    volumes:
      - image_data:/data
      - backup_data:/backups
    environment:
      - DATABASE_URL=postgresql://corgi:corgi@db:5432/corgi
      - DATA_DIR=/data
      - BACKUP_CRON_SCHEDULE=0 2 * * *
      - BACKUP_RETENTION_COUNT=30
      # Azure Blob Storage – uncomment and fill in to enable cloud storage:
      # - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=...;AccountKey=...;EndpointSuffix=core.windows.net
      # - AZURE_STORAGE_CONTAINER=corgi-backups
      # - AZURE_BLOB_PREFIX=corgi-backups
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - backup

volumes:
  pgdata:
  image_data:
  backup_data:
