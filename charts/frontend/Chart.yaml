apiVersion: v2
name: hriv-frontend
description: HRIV Frontend – React/Vite SPA served by nginx
# Chart version and app version are intentionally kept in lockstep with
# the release-please lineage — both lines carry the `x-release-please-version`
# marker so every release bumps them together, and CI stamps the same string
# into both fields at publish time. This keeps the GitHub release name, the
# git tag, the image tag, and the chart OCI tag identical so operators can
# trace any deployed pod back to a single version string.
version: 0.1.0 # x-release-please-version
appVersion: "0.1.0" # x-release-please-version
type: application
