replicaCount: 1

image:
    repository: ghcr.io/bcit-tlu/hriv/hriv-frontend
    tag: "" # Defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

service:
    type: ClusterIP
    port: 8080

# Backend service discovery.  The Helm template builds a cluster-
# internal FQDN (<host>.<namespace>.svc.cluster.local:<port>) so that
# DNS always resolves through kube-dns, avoiding corporate firewalls
# that block non-443 traffic on public/node IPs.
# Set env.BACKEND_URL to override the auto-constructed URL entirely.
backend:
    host: hriv-backend
    port: 8000
    # Namespace where the backend service lives.  When empty the chart
    # uses .Release.Namespace (i.e. the namespace you pass to
    # helm install/upgrade --namespace).  Set this explicitly if the
    # backend is deployed to a different namespace than the frontend.
    namespace: ""

env:
    BACKEND_URL: ""

# Volume mounts backed by ConfigMaps.  Each entry creates a ConfigMap
# resource and is mounted into the container at the given mountPath.
# Override the nginx config at deploy time without rebuilding the image.
#
# Each entry may populate ``data`` directly or reference files via
# ``files`` (map of ConfigMap key → chart-relative file path); the file
# contents are read with ``.Files.Get`` at template-render time.  The
# frontend nginx template below is the **single** source of truth for
# the reverse-proxy config: the same file is baked into the prod Docker
# image via a BuildKit named build context so that `docker run` of the
# published image and the Helm ConfigMap path resolve to identical
# bytes by construction.  See issue #37 for history.
configMounts:
    - name: nginx-config
      mountPath: /etc/nginx/templates
      files:
          default.conf.template: files/default.conf.template

# emptyDir mounts required by the nginx container (writable paths on a
# read-only root filesystem).
emptyDirMounts:
    - name: tmp
      mountPath: /tmp
    - name: nginx-cache
      mountPath: /var/cache/nginx
    - name: nginx-run
      mountPath: /var/run

ingress:
    enabled: false
    className: ""
    annotations:
        # Allow large image uploads through the ingress controller.
        # Without this the nginx ingress controller defaults to 1 MB,
        # which blocks pathology TIFF/SVS uploads.  0 = unlimited.
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
    hosts: []
    tls: []

networkPolicy:
    enabled: true

resources: {}

# ── High-availability / topology spreading ────────────────────
# When enabled, adds a required pod anti-affinity rule so that no two
# frontend replicas land in the same topology zone (e.g. datacenter).
# Requires nodes to be labeled with the chosen topologyKey.
# NOTE: replicaCount must not exceed the number of distinct zones,
# otherwise excess pods will remain Pending (hard scheduling constraint).
zoneAntiAffinity:
    enabled: false
    topologyKey: topology.kubernetes.io/zone

nodeSelector: {}
tolerations: []
affinity: {}
