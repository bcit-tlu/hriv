{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "corgi-frontend.fullname" . }}
  labels:
    {{- include "corgi-frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "corgi-frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic to the backend on port 8000.
    # Using an empty podSelector (all pods) so that the rule matches
    # regardless of whether the CNI evaluates NetworkPolicy before or
    # after kube-proxy DNAT.  When backend.namespace is set to a
    # different namespace, a namespaceSelector is added so egress is
    # permitted cross-namespace.
    - to:
        - podSelector: {}
          {{- if .Values.backend.namespace }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.backend.namespace }}
          {{- end }}
      ports:
        - port: {{ .Values.backend.port | default 8000 }}
          protocol: TCP
{{- end }}
