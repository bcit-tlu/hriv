{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "corgi-frontend.fullname" . }}
  labels:
    {{- include "corgi-frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "corgi-frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic to the backend service
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Values.networkPolicy.backendPodLabel }}
      ports:
        - port: 8000
          protocol: TCP
{{- end }}
