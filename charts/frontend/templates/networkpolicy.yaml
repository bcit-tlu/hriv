{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "corgi-frontend.fullname" . }}
  labels:
    {{- include "corgi-frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "corgi-frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic to the backend on port 8000.
    # Using a namespace-scoped empty podSelector (all pods in this
    # namespace) so that the rule matches regardless of whether the CNI
    # evaluates NetworkPolicy before or after kube-proxy DNAT.  A bare
    # podSelector with the backend label can fail when traffic is sent to
    # the ClusterIP rather than directly to a pod IP.
    - to:
        - podSelector: {}
      ports:
        - port: 8000
          protocol: TCP
{{- end }}
