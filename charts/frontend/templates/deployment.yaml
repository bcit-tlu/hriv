apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hriv-frontend.fullname" . }}
  labels:
    {{- include "hriv-frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hriv-frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hriv-frontend.selectorLabels" . | nindent 8 }}
      annotations:
        {{- /* Restart pods automatically when ConfigMap content changes.
               Hash covers both inline ``data`` and any file-backed
               ``files`` entries so edits to chart-relative files (e.g.
               ``files/default.conf.template``) still trigger a rollout. */}}
        {{- range $m := (.Values.configMounts | default list) }}
        {{- $parts := list (toYaml ($m.data | default dict)) }}
        {{- range $key, $path := ($m.files | default dict) }}
        {{-   $parts = append $parts (printf "%s=%s" $key ($.Files.Get $path)) }}
        {{- end }}
        checksum/{{ $m.name }}: {{ join "\n" $parts | sha256sum }}
        {{- end }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: {{ .Values.env.BACKEND_URL | default (printf "http://%s.%s.svc.cluster.local:%d" .Values.backend.host (.Values.backend.namespace | default .Release.Namespace) (.Values.backend.port | int)) | quote }}
            # Frontend display version exposed at runtime via the
            # nginx ``/version`` endpoint (see
            # ``files/default.conf.template``). nginx's
            # ``docker-entrypoint.d`` renders
            # ``*.conf.template`` via ``envsubst``, substituting this
            # env var into the response body. Rendering at deploy time
            # rather than baking into the Vite bundle at build time
            # means retag-promoted production images (same digest,
            # release tag) report the clean ``<ver>`` instead of the
            # main-build ``-rc.<short>`` identity.
            - name: APP_VERSION
              value: {{ include "hriv-frontend.displayVersion" . | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- range $m := (.Values.configMounts | default list) }}
            - name: {{ $m.name }}
              mountPath: {{ $m.mountPath | quote }}
            {{- end }}
            {{- range $m := (.Values.emptyDirMounts | default list) }}
            - name: {{ $m.name }}
              mountPath: {{ $m.mountPath | quote }}
            {{- end }}
      volumes:
        {{- range $m := (.Values.configMounts | default list) }}
        - name: {{ $m.name }}
          configMap:
            name: {{ $m.name | quote }}
        {{- end }}
        {{- range $m := (.Values.emptyDirMounts | default list) }}
        - name: {{ $m.name }}
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $aff := deepCopy (.Values.affinity | default dict) }}
      {{- if .Values.zoneAntiAffinity.enabled }}
        {{- $zoneRule := dict "labelSelector" (dict "matchLabels" (include "hriv-frontend.selectorLabels" . | fromYaml)) "topologyKey" .Values.zoneAntiAffinity.topologyKey }}
        {{- $existing := list }}
        {{- if and (hasKey $aff "podAntiAffinity") $aff.podAntiAffinity }}
          {{- $existing = $aff.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution | default list }}
        {{- end }}
        {{- $merged := dict "podAntiAffinity" (dict "requiredDuringSchedulingIgnoredDuringExecution" (append $existing $zoneRule)) }}
        {{- $aff = mustMergeOverwrite $aff $merged }}
      {{- end }}
      {{- if $aff }}
      affinity:
        {{- toYaml $aff | nindent 8 }}
      {{- end }}
