apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corgi-frontend.fullname" . }}
  labels:
    {{- include "corgi-frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "corgi-frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "corgi-frontend.selectorLabels" . | nindent 8 }}
      annotations:
        {{- /* Restart pods automatically when ConfigMap content changes */}}
        {{- range $m := (.Values.configMounts | default list) }}
        checksum/{{ $m.name }}: {{ toYaml $m.data | sha256sum }}
        {{- end }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: {{ .Values.env.BACKEND_URL | default (printf "http://%s.%s.svc.cluster.local:%d" .Values.backend.host (.Values.backend.namespace | default .Release.Namespace) (.Values.backend.port | int)) | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- range $m := (.Values.configMounts | default list) }}
            - name: {{ $m.name }}
              mountPath: {{ $m.mountPath | quote }}
            {{- end }}
            {{- range $m := (.Values.emptyDirMounts | default list) }}
            - name: {{ $m.name }}
              mountPath: {{ $m.mountPath | quote }}
            {{- end }}
      volumes:
        {{- range $m := (.Values.configMounts | default list) }}
        - name: {{ $m.name }}
          configMap:
            name: {{ $m.name | quote }}
        {{- end }}
        {{- range $m := (.Values.emptyDirMounts | default list) }}
        - name: {{ $m.name }}
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
