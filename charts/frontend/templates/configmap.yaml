{{- range $m := (.Values.configMounts | default list) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $m.name | quote }}
  labels:
    {{- include "hriv-frontend.labels" $ | nindent 4 }}
{{- if or $m.data $m.files }}
data:
{{- if $m.data }}
{{ toYaml $m.data | indent 2 }}
{{- end }}
{{- range $key, $path := ($m.files | default dict) }}
  {{ $key }}: |-
  {{- /* .Files.Get reads files included in the packaged chart.  If a
         .helmignore is ever added to this chart, any pattern that
         excludes `$path` (e.g. `files/`, `*.template`) will make this
         call return an empty string and silently produce an empty
         ConfigMap value.  Keep `charts/frontend/files/**` unignored. */}}
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
