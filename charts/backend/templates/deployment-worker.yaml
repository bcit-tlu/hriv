{{- $sourceImages := include "hriv-backend.resolvedSourceImagesPersistence" . | fromYaml -}}
{{- $tiles := include "hriv-backend.resolvedTilesPersistence" . | fromYaml -}}
{{- $sourceImagesAccessModes := get $sourceImages "accessModes" -}}
{{- $tilesAccessModes := get $tiles "accessModes" -}}
{{- if and .Values.redis.worker.enabled (not .Values.redis.enabled) }}
{{- fail "redis.worker.enabled requires redis.enabled — the worker needs a Redis connection" }}
{{- end }}
{{- if and .Values.redis.enabled .Values.redis.worker.enabled .Values.persistence.enabled (not (has "ReadWriteMany" $sourceImagesAccessModes)) }}
{{- fail "redis.worker.enabled with persistence requires a ReadWriteMany source-images PVC — the worker and API pods both mount /data" }}
{{- end }}
{{- if and .Values.redis.enabled .Values.redis.worker.enabled .Values.persistence.enabled (not (has "ReadWriteMany" $tilesAccessModes)) }}
{{- fail "redis.worker.enabled with persistence requires a ReadWriteMany tiles PVC — the worker and API pods both mount /data/tiles" }}
{{- end }}
{{- if and .Values.redis.enabled .Values.redis.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hriv-backend.fullname" . }}-worker
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.redis.worker.autoscaling.enabled }}
  replicas: {{ .Values.redis.worker.replicaCount }}
  {{- end }}
  {{- if and .Values.persistence.enabled (or (has "ReadWriteOnce" $sourceImagesAccessModes) (has "ReadWriteOnce" $tilesAccessModes)) }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "hriv-backend.name" . }}-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "hriv-backend.name" . }}-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["opentelemetry-instrument", "arq", "app.worker.WorkerSettings"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-db-credentials
                  key: uri
            - name: SOURCE_IMAGES_DIR
              value: {{ .Values.env.SOURCE_IMAGES_DIR | quote }}
            - name: TILES_DIR
              value: {{ .Values.env.TILES_DIR | quote }}
            - name: EXPORT_PIGZ_THREADS
              value: {{ .Values.env.EXPORT_PIGZ_THREADS | quote }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- if .Values.observability.openTelemetry.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ printf "%s-worker" .Values.observability.openTelemetry.serviceName | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.observability.openTelemetry.exporter.traces | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.observability.openTelemetry.exporter.metrics | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.observability.openTelemetry.exporter.logs | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.openTelemetry.exporter.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.observability.openTelemetry.exporter.protocol | quote }}
            - name: OTEL_PYTHON_DISABLED_INSTRUMENTATIONS
              value: "redis"
            - name: OTEL_PYTHON_FASTAPI_EXCLUDED_URLS
              value: {{ .Values.observability.openTelemetry.excludedUrls | quote }}
            {{- end }}
          {{- with .Values.redis.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: source-images
              mountPath: /data
            - name: tiles-data
              mountPath: /data/tiles
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: source-images
          persistentVolumeClaim:
            claimName: {{ get $sourceImages "existingClaim" | default (printf "%s-source-images" (include "hriv-backend.fullname" .)) }}
        - name: tiles-data
          persistentVolumeClaim:
            claimName: {{ get $tiles "existingClaim" | default (printf "%s-tiles" (include "hriv-backend.fullname" .)) }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
