{{- if and .Values.auth.openidConnect.enabled (not .Values.vault.enabled) (not .Values.auth.openidConnect.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hriv-backend.fullname" . }}-openid-connect
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ .Values.auth.openidConnect.clientId | quote }}
  client-secret: {{ .Values.auth.openidConnect.clientSecret | quote }}
{{- end }}
