{{- if not .Values.vault.enabled }}
{{- if .Values.cnpg.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hriv-backend.fullname" . }}-db-superuser-bootstrap
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: {{ .Values.cnpg.devPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hriv-backend.fullname" . }}-db-bootstrap
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.cnpg.owner | quote }}
  password: {{ .Values.cnpg.devPassword | quote }}
{{- end }}
{{- if not .Values.reportIssue.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hriv-backend.fullname" . }}-report-issue-pat
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: someGHtoken
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hriv-backend.fullname" . }}-db-app
type: Opaque
stringData:
  {{- if .Values.cnpg.enabled }}
  uri: "postgresql://{{ .Values.cnpg.owner }}:{{ .Values.cnpg.devPassword }}@{{ include "hriv-backend.fullname" . }}-db-rw:5432/{{ .Values.cnpg.database }}"
  {{- else if .Values.cnpg.externalDatabaseUri }}
  uri: {{ .Values.cnpg.externalDatabaseUri | quote }}
  {{- else }}
  {{- fail "cnpg.enabled=false without vault.enabled=true requires cnpg.externalDatabaseUri" }}
  {{- end }}
{{- end }}
