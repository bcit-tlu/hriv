{{- if and .Values.tiles.enabled (not .Values.persistence.enabled) }}
{{- fail "tiles.enabled requires persistence.enabled — the sidecar serves tiles from the PVC" }}
{{- end }}
{{- $backupVersionMountPath := trimSuffix "/" .Values.backupVersionConfigMap.mountPath -}}
{{- $frontendVersionMountPath := trimSuffix "/" .Values.frontendVersionConfigMap.mountPath -}}
{{- if and .Values.backupVersionConfigMap.enabled .Values.frontendVersionConfigMap.enabled (eq $backupVersionMountPath $frontendVersionMountPath) }}
{{- fail "backupVersionConfigMap.mountPath and frontendVersionConfigMap.mountPath must differ when both ConfigMap mounts are enabled" }}
{{- end }}
{{- $sourceImages := include "hriv-backend.resolvedSourceImagesPersistence" . | fromYaml -}}
{{- $tiles := include "hriv-backend.resolvedTilesPersistence" . | fromYaml -}}
{{- $feedback := include "hriv-backend.feedbackConfig" . | fromYaml -}}
{{- $backendProbes := .Values.probes.backend | default dict -}}
{{- $backendLivenessProbe := get $backendProbes "liveness" | default dict -}}
{{- $backendReadinessProbe := get $backendProbes "readiness" | default dict -}}
{{- $sourceImagesAccessModes := get $sourceImages "accessModes" -}}
{{- $tilesAccessModes := get $tiles "accessModes" -}}
{{- $feedbackProvider := get $feedback "provider" -}}
{{- if and $feedbackProvider (not (has $feedbackProvider (list "github" "teams"))) }}
{{- fail "feedback.provider currently supports only 'github', 'teams', or empty/disabled while ServiceNow is still unimplemented" }}
{{- end }}
{{- if and (eq $feedbackProvider "github") (not (get $feedback "githubRepository")) }}
{{- fail "feedback.provider=github requires feedback.github.repository (or legacy github-issue.repository)" }}
{{- end }}
{{- if and (eq $feedbackProvider "github") (not (get $feedback "githubSecret")) }}
{{- fail "feedback.provider=github requires feedback.github.token.existingSecret (or legacy github-issue.token.existingSecret); secret must contain key 'token'" }}
{{- end }}
{{- if and (eq $feedbackProvider "teams") (not (get $feedback "teamsSecret")) }}
{{- fail "feedback.provider=teams requires feedback.teams.webhook.existingSecret; secret must contain key 'url'" }}
{{- end }}
{{- if and .Values.persistence.enabled (gt (.Values.replicaCount | int) 1) (not (has "ReadWriteMany" $sourceImagesAccessModes)) }}
{{- fail "replicaCount > 1 requires a ReadWriteMany source-images PVC — background admin tasks write result files to the shared /data volume that any replica must be able to serve" }}
{{- end }}
{{- if and .Values.persistence.enabled (gt (.Values.replicaCount | int) 1) (not (has "ReadWriteMany" $tilesAccessModes)) }}
{{- fail "replicaCount > 1 requires a ReadWriteMany tiles PVC — all replicas must be able to serve generated DZI tiles" }}
{{- end }}
{{- $rwoPersistence := and .Values.persistence.enabled (or (has "ReadWriteOnce" $sourceImagesAccessModes) (has "ReadWriteOnce" $tilesAccessModes)) -}}
{{- if and .Values.updateStrategy $rwoPersistence (ne (get .Values.updateStrategy "type") "Recreate") }}
{{- fail "ReadWriteOnce PVCs require Recreate; set updateStrategy.type=Recreate or switch to ReadWriteMany" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hriv-backend.fullname" . }}
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.updateStrategy }}
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  {{- else if $rwoPersistence }}
  strategy:
    type: Recreate
  {{- else if and .Values.scheduling.zoneAntiAffinity.enabled (gt (.Values.replicaCount | int) 1) }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "hriv-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hriv-backend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        hriv.bcit.ca/backend-zone-member: "true"
    spec:
      initContainers:
        # Run ``alembic upgrade head`` against the database before the
        # FastAPI app starts.  On a fresh CNPG cluster this creates every
        # application table; on a subsequent rollout it applies any pending
        # revisions.  Idempotent — once the DB is at ``head`` the bootstrap
        # simply no-ops.  Keeps the pod deployment self-sufficient without
        # requiring a separate Job or post-upgrade hook.  Serialized across
        # replicas via ``pg_advisory_lock`` (see ``app.migrations_bootstrap``).
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "app.migrations_bootstrap"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-db-credentials
                  key: uri
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-db-credentials
                  key: uri
            - name: SOURCE_IMAGES_DIR
              value: {{ .Values.env.SOURCE_IMAGES_DIR | quote }}
            - name: TILES_DIR
              value: {{ .Values.env.TILES_DIR | quote }}
            - name: EXPORT_PIGZ_THREADS
              value: {{ .Values.env.EXPORT_PIGZ_THREADS | quote }}
            - name: AZURE_BACKUP_PREFIX
              value: {{ .Values.env.AZURE_BACKUP_PREFIX | quote }}
            - name: AZURE_READ_SAS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.azureReadBackup.secretName | quote }}
                  key: azureReadSasUrl
                  optional: true
            {{- if $feedbackProvider }}
            - name: FEEDBACK_DELIVERY_PROVIDER
              value: {{ $feedbackProvider | quote }}
            {{- end }}
            {{- if eq $feedbackProvider "github" }}
            - name: FEEDBACK_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ get $feedback "githubSecret" }}
                  key: token
            - name: FEEDBACK_GITHUB_REPOSITORY
              value: {{ get $feedback "githubRepository" | quote }}
            {{- end }}
            {{- if eq $feedbackProvider "teams" }}
            - name: FEEDBACK_TEAMS_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ get $feedback "teamsSecret" }}
                  key: url
            {{- end }}
            # Backend component version surfaced by /api/admin/version
            # and the FastAPI `app.version` attribute. Rendered from
            # `.Values.image.tag | default .Chart.AppVersion` with the
            # rc-timestamp stripped (see `hriv-backend.displayVersion`
            # helper). Supplying the value here rather than baking it
            # into the image as a build-arg keeps retag-promoted
            # production images (same digest, different tag under
            # `release-retag.yaml`) displaying a clean `<ver>` while
            # the main-build `latest` env renders `<ver>-rc.<short>`.
            - name: APP_VERSION
              value: {{ include "hriv-backend.displayVersion" . | quote }}
            - name: APP_IMAGE_TAG
              value: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
            # Backup component version surfaced by /api/admin/version.
            # Precedence (see backend/app/routers/admin.py):
            #   1. BACKUP_VERSION_FILE → file contents (ConfigMap mount,
            #      re-read on every admin version request so kubelet
            #      ConfigMap refresh propagates without pod restart).
            #   2. BACKUP_VERSION env var (legacy / local override).
            #   3. "dev" fallback for unset local / dev installs.
            - name: BACKUP_VERSION
              value: {{ .Values.backupVersion | default "" | quote }}
            {{- if .Values.backupVersionConfigMap.enabled }}
            - name: BACKUP_VERSION_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" .Values.backupVersionConfigMap.mountPath) .Values.backupVersionConfigMap.key | quote }}
            - name: BACKUP_IMAGE_TAG_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" .Values.backupVersionConfigMap.mountPath) .Values.backupVersionConfigMap.imageTagKey | quote }}
            {{- end }}
            - name: FRONTEND_VERSION
              value: {{ .Values.frontendVersion | default "" | quote }}
            {{- if .Values.frontendVersionConfigMap.enabled }}
            - name: FRONTEND_VERSION_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" .Values.frontendVersionConfigMap.mountPath) .Values.frontendVersionConfigMap.key | quote }}
            - name: FRONTEND_IMAGE_TAG_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" .Values.frontendVersionConfigMap.mountPath) .Values.frontendVersionConfigMap.imageTagKey | quote }}
            {{- end }}
            {{- if .Values.observability.openTelemetry.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.openTelemetry.serviceName | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.observability.openTelemetry.exporter.traces | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.observability.openTelemetry.exporter.metrics | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.observability.openTelemetry.exporter.logs | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.openTelemetry.exporter.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.observability.openTelemetry.exporter.protocol | quote }}
            - name: OTEL_PYTHON_FASTAPI_EXCLUDED_URLS
              value: {{ .Values.observability.openTelemetry.excludedUrls | quote }}
            - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
              value: {{ .Values.observability.openTelemetry.loggingAutoInstrumentation | quote }}
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "hriv-backend.fullname" . }}-jwt
                  key: secret
            # Enforce a stable, shared JWT_SECRET at runtime.
            # With multiple replicas and/or uvicorn workers this is required
            # so tokens signed by one worker validate on every other worker.
            - name: REQUIRE_JWT_SECRET
              value: "true"
            {{- if .Values.auth.openidConnect.enabled }}
            {{- $oidcSecret := .Values.auth.openidConnect.existingSecret | default (printf "%s-openid-connect" (include "hriv-backend.fullname" .)) }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $oidcSecret }}
                  key: client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $oidcSecret }}
                  key: client-secret
            {{- end }}
          {{- if .Values.auth.openidConnect.enabled }}
          envFrom:
            - configMapRef:
                name: {{ include "hriv-backend.fullname" . }}-openid-connect
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ get $backendLivenessProbe "path" | default "/api/health" | quote }}
              port: http
            initialDelaySeconds: {{ get $backendLivenessProbe "initialDelaySeconds" | default 10 }}
            periodSeconds: {{ get $backendLivenessProbe "periodSeconds" | default 30 }}
            timeoutSeconds: {{ get $backendLivenessProbe "timeoutSeconds" | default 5 }}
            failureThreshold: {{ get $backendLivenessProbe "failureThreshold" | default 6 }}
          readinessProbe:
            httpGet:
              path: {{ get $backendReadinessProbe "path" | default "/api/health/ready" | quote }}
              port: http
            initialDelaySeconds: {{ get $backendReadinessProbe "initialDelaySeconds" | default 5 }}
            periodSeconds: {{ get $backendReadinessProbe "periodSeconds" | default 10 }}
            timeoutSeconds: {{ get $backendReadinessProbe "timeoutSeconds" | default 5 }}
            failureThreshold: {{ get $backendReadinessProbe "failureThreshold" | default 3 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.persistence.enabled .Values.backupVersionConfigMap.enabled .Values.frontendVersionConfigMap.enabled }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: source-images
              mountPath: /data
            - name: tiles-data
              mountPath: /data/tiles
            {{- end }}
            {{- if .Values.backupVersionConfigMap.enabled }}
            - name: backup-version
              mountPath: {{ .Values.backupVersionConfigMap.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.frontendVersionConfigMap.enabled }}
            - name: frontend-version
              mountPath: {{ .Values.frontendVersionConfigMap.mountPath | quote }}
              readOnly: true
            {{- end }}
          {{- end }}
        {{- if .Values.tiles.enabled }}
        - name: tile-server
          image: {{ .Values.tiles.nginx.image | quote }}
          ports:
            - name: tiles
              containerPort: {{ .Values.tiles.nginx.port }}
              protocol: TCP
          volumeMounts:
            - name: source-images
              mountPath: /data
              readOnly: true
            - name: tiles-data
              mountPath: /data/tiles
              readOnly: true
            - name: nginx-tiles-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: tiles
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: tiles
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.tiles.nginx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- if or .Values.persistence.enabled .Values.tiles.enabled .Values.backupVersionConfigMap.enabled .Values.frontendVersionConfigMap.enabled }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: source-images
          persistentVolumeClaim:
            claimName: {{ get $sourceImages "existingClaim" | default (printf "%s-source-images" (include "hriv-backend.fullname" .)) }}
        - name: tiles-data
          persistentVolumeClaim:
            claimName: {{ get $tiles "existingClaim" | default (printf "%s-tiles" (include "hriv-backend.fullname" .)) }}
        {{- end }}
        {{- if .Values.tiles.enabled }}
        - name: nginx-tiles-config
          configMap:
            name: {{ include "hriv-backend.fullname" . }}-nginx-tiles
        {{- end }}
        {{- if .Values.backupVersionConfigMap.enabled }}
        # Optional mount: if the backup chart isn't deployed (or the
        # ConfigMap name is wrong), the volume renders with no keys
        # and /api/admin/version falls back to BACKUP_VERSION / "dev"
        # instead of the pod failing to start.
        - name: backup-version
          configMap:
            name: {{ .Values.backupVersionConfigMap.name | quote }}
            optional: true
        {{- end }}
        {{- if .Values.frontendVersionConfigMap.enabled }}
        - name: frontend-version
          configMap:
            name: {{ .Values.frontendVersionConfigMap.name | quote }}
            optional: true
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $aff := deepCopy (.Values.affinity | default dict) }}
      {{- if .Values.scheduling.zoneAntiAffinity.enabled }}
        {{- $zoneMatchLabels := dict "hriv.bcit.ca/backend-zone-member" "true" }}
        {{- $zoneRule := dict "labelSelector" (dict "matchLabels" $zoneMatchLabels) "topologyKey" .Values.scheduling.zoneAntiAffinity.topologyKey }}
        {{- $existing := list }}
        {{- if and (hasKey $aff "podAntiAffinity") $aff.podAntiAffinity }}
          {{- $existing = $aff.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution | default list }}
        {{- end }}
        {{- $merged := dict "podAntiAffinity" (dict "requiredDuringSchedulingIgnoredDuringExecution" (append $existing $zoneRule)) }}
        {{- $aff = mustMergeOverwrite $aff $merged }}
      {{- end }}
      {{- if ne (toJson $aff) "{}" }}
      affinity:
        {{- toYaml $aff | nindent 8 }}
      {{- end }}
