{{- if and .Values.tileSidecar.enabled (not .Values.persistence.enabled) }}
{{- fail "tileSidecar.enabled requires persistence.enabled — the sidecar serves tiles from the PVC" }}
{{- end }}
{{- if and .Values.persistence.enabled (gt (.Values.replicaCount | int) 1) (not (has "ReadWriteMany" .Values.persistence.accessModes)) }}
{{- fail "replicaCount > 1 requires a ReadWriteMany PVC — background admin tasks write result files to the shared volume that any replica must be able to serve" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hriv-backend.fullname" . }}
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if and .Values.persistence.enabled (has "ReadWriteOnce" .Values.persistence.accessModes) }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "hriv-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hriv-backend.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        # Run ``alembic upgrade head`` against the database before the
        # FastAPI app starts.  On a fresh CNPG cluster this creates every
        # application table; on a subsequent rollout it applies any pending
        # revisions.  Idempotent — once the DB is at ``head`` the bootstrap
        # simply no-ops.  Keeps the pod deployment self-sufficient without
        # requiring a separate Job or post-upgrade hook.  Serialized across
        # replicas via ``pg_advisory_lock`` (see ``app.migrations_bootstrap``).
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "app.migrations_bootstrap"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "hriv-backend.fullname" . }}-db-app
                  key: uri
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "hriv-backend.fullname" . }}-db-app
                  key: uri
            - name: SOURCE_IMAGES_DIR
              value: {{ .Values.env.SOURCE_IMAGES_DIR | quote }}
            - name: TILES_DIR
              value: {{ .Values.env.TILES_DIR | quote }}
            {{- if .Values.vault.enabled }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "hriv-backend.fullname" . }}-github-pat
                  key: token
            {{- end }}
            - name: GITHUB_REPO
              value: {{ .Values.env.GITHUB_REPO | quote }}
            # Backend component version surfaced by /api/admin/version
            # and the FastAPI `app.version` attribute. Rendered from
            # `.Values.image.tag | default .Chart.AppVersion` with the
            # rc-timestamp stripped (see `hriv-backend.displayVersion`
            # helper). Supplying the value here rather than baking it
            # into the image as a build-arg keeps retag-promoted
            # production images (same digest, different tag under
            # `release-retag.yaml`) displaying a clean `<ver>` while
            # the main-build `latest` env renders `<ver>-rc.<short>`.
            - name: APP_VERSION
              value: {{ include "hriv-backend.displayVersion" . | quote }}
            # Backup component version surfaced by /api/admin/version.
            # Precedence (see backend/app/routers/admin.py):
            #   1. BACKUP_VERSION_FILE → file contents (ConfigMap mount,
            #      re-read on every admin version request so kubelet
            #      ConfigMap refresh propagates without pod restart).
            #   2. BACKUP_VERSION env var (legacy / local override).
            #   3. "dev" fallback for unset local / dev installs.
            - name: BACKUP_VERSION
              value: {{ .Values.backupVersion | default "" | quote }}
            {{- if .Values.backupVersionConfigMap.enabled }}
            - name: BACKUP_VERSION_FILE
              value: {{ printf "%s/%s" (trimSuffix "/" .Values.backupVersionConfigMap.mountPath) .Values.backupVersionConfigMap.key | quote }}
            {{- end }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.otel.tracesExporter | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.otel.metricsExporter | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.otel.logsExporter | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.otel.exporterProtocol | quote }}
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "hriv-backend.fullname" . }}-jwt
                  key: secret
            # Enforce a stable, shared JWT_SECRET at runtime.
            # With multiple replicas and/or uvicorn workers this is required
            # so tokens signed by one worker validate on every other worker.
            - name: REQUIRE_JWT_SECRET
              value: "true"
            {{- if .Values.oidc.enabled }}
            {{- $oidcSecret := .Values.oidc.existingSecret | default (printf "%s-oidc" (include "hriv-backend.fullname" .)) }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $oidcSecret }}
                  key: client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $oidcSecret }}
                  key: client-secret
            {{- end }}
          {{- if .Values.oidc.enabled }}
          envFrom:
            - configMapRef:
                name: {{ include "hriv-backend.fullname" . }}-oidc
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.persistence.enabled .Values.backupVersionConfigMap.enabled }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.backupVersionConfigMap.enabled }}
            - name: backup-version
              mountPath: {{ .Values.backupVersionConfigMap.mountPath | quote }}
              readOnly: true
            {{- end }}
          {{- end }}
        {{- if .Values.tileSidecar.enabled }}
        - name: tile-server
          image: {{ .Values.tileSidecar.image | quote }}
          ports:
            - name: tiles
              containerPort: {{ .Values.tileSidecar.port }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: nginx-tiles-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: tiles
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: tiles
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.tileSidecar.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- if or .Values.persistence.enabled .Values.tileSidecar.enabled .Values.backupVersionConfigMap.enabled }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hriv-backend.fullname" . }}-data
        {{- end }}
        {{- if .Values.tileSidecar.enabled }}
        - name: nginx-tiles-config
          configMap:
            name: {{ include "hriv-backend.fullname" . }}-nginx-tiles
        {{- end }}
        {{- if .Values.backupVersionConfigMap.enabled }}
        # Optional mount: if the backup chart isn't deployed (or the
        # ConfigMap name is wrong), the volume renders with no keys
        # and /api/admin/version falls back to BACKUP_VERSION / "dev"
        # instead of the pod failing to start.
        - name: backup-version
          configMap:
            name: {{ .Values.backupVersionConfigMap.name | quote }}
            optional: true
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $aff := deepCopy (.Values.affinity | default dict) }}
      {{- if .Values.zoneAntiAffinity.enabled }}
        {{- $zoneRule := dict "labelSelector" (dict "matchLabels" (include "hriv-backend.selectorLabels" . | fromYaml)) "topologyKey" .Values.zoneAntiAffinity.topologyKey }}
        {{- $existing := list }}
        {{- if and (hasKey $aff "podAntiAffinity") $aff.podAntiAffinity }}
          {{- $existing = $aff.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution | default list }}
        {{- end }}
        {{- $merged := dict "podAntiAffinity" (dict "requiredDuringSchedulingIgnoredDuringExecution" (append $existing $zoneRule)) }}
        {{- $aff = mustMergeOverwrite $aff $merged }}
      {{- end }}
      {{- if $aff }}
      affinity:
        {{- toYaml $aff | nindent 8 }}
      {{- end }}
