{{- if and .Values.tileSidecar.enabled (not .Values.persistence.enabled) }}
{{- fail "tileSidecar.enabled requires persistence.enabled — the sidecar serves tiles from the PVC" }}
{{- end }}
{{- if and .Values.persistence.enabled (gt (.Values.replicaCount | int) 1) (has "ReadWriteOnce" .Values.persistence.accessModes) }}
{{- fail "replicaCount > 1 with a ReadWriteOnce PVC is not supported — multiple pods cannot mount the same RWO volume" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hriv-backend.fullname" . }}
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if and .Values.persistence.enabled (has "ReadWriteOnce" .Values.persistence.accessModes) }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "hriv-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hriv-backend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "hriv-backend.fullname" . }}-db-app
                  key: uri
            - name: SOURCE_IMAGES_DIR
              value: {{ .Values.env.SOURCE_IMAGES_DIR | quote }}
            - name: TILES_DIR
              value: {{ .Values.env.TILES_DIR | quote }}
            {{- if .Values.vault.enabled }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "hriv-backend.fullname" . }}-github-pat
                  key: token
            {{- end }}
            - name: GITHUB_REPO
              value: {{ .Values.env.GITHUB_REPO | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.env.OTEL_SERVICE_NAME | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.env.OTEL_TRACES_EXPORTER | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.env.OTEL_METRICS_EXPORTER | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.env.OTEL_LOGS_EXPORTER | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_PROTOCOL | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "hriv-backend.fullname" . }}-jwt
                  key: secret
            {{- if .Values.oidc.enabled }}
            {{- $oidcSecret := .Values.oidc.existingSecret | default (printf "%s-oidc" (include "hriv-backend.fullname" .)) }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $oidcSecret }}
                  key: client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $oidcSecret }}
                  key: client-secret
            {{- end }}
          {{- if .Values.oidc.enabled }}
          envFrom:
            - configMapRef:
                name: {{ include "hriv-backend.fullname" . }}-oidc
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
        {{- if .Values.tileSidecar.enabled }}
        - name: tile-server
          image: {{ .Values.tileSidecar.image | quote }}
          ports:
            - name: tiles
              containerPort: {{ .Values.tileSidecar.port }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: nginx-tiles-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: tiles
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: tiles
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.tileSidecar.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- if or .Values.persistence.enabled .Values.tileSidecar.enabled }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hriv-backend.fullname" . }}-data
        {{- end }}
        {{- if .Values.tileSidecar.enabled }}
        - name: nginx-tiles-config
          configMap:
            name: {{ include "hriv-backend.fullname" . }}-nginx-tiles
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $aff := deepCopy (.Values.affinity | default dict) }}
      {{- if .Values.zoneAntiAffinity.enabled }}
        {{- $zoneRule := dict "labelSelector" (dict "matchLabels" (include "hriv-backend.selectorLabels" . | fromYaml)) "topologyKey" .Values.zoneAntiAffinity.topologyKey }}
        {{- $existing := list }}
        {{- if hasKey $aff "podAntiAffinity" }}
          {{- $existing = $aff.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution | default list }}
        {{- end }}
        {{- $merged := dict "podAntiAffinity" (dict "requiredDuringSchedulingIgnoredDuringExecution" (append $existing $zoneRule)) }}
        {{- $aff = mustMergeOverwrite $aff $merged }}
      {{- end }}
      {{- if $aff }}
      affinity:
        {{- toYaml $aff | nindent 8 }}
      {{- end }}
