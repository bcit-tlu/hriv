apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corgi-backend.fullname" . }}
  labels:
    {{- include "corgi-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "corgi-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "corgi-backend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "corgi-backend.fullname" . }}-db-app
                  key: uri
            - name: SOURCE_IMAGES_DIR
              value: {{ .Values.env.SOURCE_IMAGES_DIR | quote }}
            - name: TILES_DIR
              value: {{ .Values.env.TILES_DIR | quote }}
            {{- if .Values.vault.enabled }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "corgi-backend.fullname" . }}-github-pat
                  key: token
            {{- end }}
            - name: GITHUB_REPO
              value: {{ .Values.env.GITHUB_REPO | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "corgi-backend.fullname" . }}-jwt
                  key: secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "corgi-backend.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
