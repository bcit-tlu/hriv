{{- $jwtSecretName := printf "%s-jwt" (include "hriv-backend.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $jwtSecretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $jwtSecretName }}
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ if and $existingSecret (index $existingSecret.data "secret") }}{{ index $existingSecret.data "secret" | b64dec | quote }}{{ else }}{{ .Values.jwtSecret | default (randAlphaNum 64) | quote }}{{ end }}
