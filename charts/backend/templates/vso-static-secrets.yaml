{{- if .Values.vault.enabled }}
# VSO static secret for the CNPG app user credentials.
# Vault path should contain keys: username, password
# VSO renders these into a kubernetes.io/basic-auth Secret that CNPG
# references as the bootstrap owner credential.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "corgi-backend.fullname" . }}-db-bootstrap
  labels:
    {{- include "corgi-backend.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.kvMount }}
  path: {{ .Values.vault.dbAppSecretPath }}
  vaultAuthRef: {{ .Values.vault.authRef }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  destination:
    name: {{ include "corgi-backend.fullname" . }}-db-bootstrap
    create: true
    type: kubernetes.io/basic-auth
---
# VSO static secret for the CNPG superuser credentials.
# Vault path should contain keys: username, password
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "corgi-backend.fullname" . }}-db-superuser-bootstrap
  labels:
    {{- include "corgi-backend.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.kvMount }}
  path: {{ .Values.vault.dbSuperuserSecretPath }}
  vaultAuthRef: {{ .Values.vault.authRef }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  destination:
    name: {{ include "corgi-backend.fullname" . }}-db-superuser-bootstrap
    create: true
    type: kubernetes.io/basic-auth
---
# VSO static secret that builds the application connection URI expected by
# the backend Deployment (DATABASE_URL).
# CNPG does NOT auto-generate the <cluster>-app secret when
# bootstrap.initdb.secret.name is provided, so we construct the
# postgresql:// URI here from the same Vault username/password.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "corgi-backend.fullname" . }}-db-app
  labels:
    {{- include "corgi-backend.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.kvMount }}
  path: {{ .Values.vault.dbAppSecretPath }}
  vaultAuthRef: {{ .Values.vault.authRef }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  destination:
    name: {{ include "corgi-backend.fullname" . }}-db-app
    create: true
    type: Opaque
    transformation:
      excludes:
        - "*"
      templates:
        uri:
          text: {{ printf `postgresql://{{ get .Secrets "username" | urlquery }}:{{ get .Secrets "password" | urlquery }}@%s-db-rw:5432/%s` (include "corgi-backend.fullname" .) .Values.cnpg.database | quote }}
---
# VSO static secret for the GitHub PAT used by issue reporting.
# Vault path should contain key: token
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "corgi-backend.fullname" . }}-github-pat
  labels:
    {{- include "corgi-backend.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.kvMount }}
  path: {{ .Values.vault.githubPatSecretPath }}
  vaultAuthRef: {{ .Values.vault.authRef }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  destination:
    name: {{ include "corgi-backend.fullname" . }}-github-pat
    create: true
    type: Opaque
{{- end }}
