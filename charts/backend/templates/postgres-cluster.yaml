{{- if .Values.postgres.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "hriv-backend.fullname" . }}-db
  labels:
    {{- include "hriv-backend.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgres.cluster.instances }}
  imageName: {{ .Values.postgres.cluster.image }}

  bootstrap:
    # Schema is managed by Alembic, not by CNPG.  The backend Deployment's
    # ``migrate`` initContainer runs ``alembic upgrade head`` against this
    # database on every rollout (see ``charts/backend/templates/deployment.yaml``).
    # CNPG therefore only needs to create the empty database + owner role
    # and grant schema privileges; the tables themselves are created by
    # the initContainer on first install.
    initdb:
      database: {{ .Values.postgres.auth.database }}
      owner: {{ .Values.postgres.auth.username }}
      secret:
        name: {{ include "hriv-backend.fullname" . }}-db-bootstrap
      postInitApplicationSQL:
        - GRANT ALL ON SCHEMA public TO {{ .Values.postgres.auth.username | quote }}
        - ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON TABLES TO {{ .Values.postgres.auth.username | quote }}
        - ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ .Values.postgres.auth.username | quote }}

  superuserSecret:
    name: {{ include "hriv-backend.fullname" . }}-db-superuser-bootstrap

  storage:
    {{- if .Values.postgres.persistence.storageClass }}
    storageClass: {{ .Values.postgres.persistence.storageClass }}
    {{- end }}
    size: {{ .Values.postgres.persistence.size }}

  {{- if .Values.postgres.cluster.enableSuperuserAccess }}
  enableSuperuserAccess: true
  {{- end }}
{{- end }}
