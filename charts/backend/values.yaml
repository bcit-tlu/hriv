replicaCount: 1

image:
    repository: ghcr.io/bcit-tlu/hriv/hriv-backend
    tag: 0.1.0 # x-release-please-version
    pullPolicy: IfNotPresent

service:
    type: ClusterIP
    port: 8000

env:
    SOURCE_IMAGES_DIR: /data/source_images
    TILES_DIR: /data/tiles
    GITHUB_REPO: "https://github.com/bcit-tlu/hriv"
    # OpenTelemetry configuration.
    # These are read by the OpenTelemetry Python SDK / auto-instrumentation.
    # Note: exporting traces typically also requires starting the process via
    # opentelemetry-instrument (or using operator-based injection).
    OTEL_SERVICE_NAME: "hriv-backend"
    OTEL_TRACES_EXPORTER: "none"
    OTEL_METRICS_EXPORTER: "none"
    OTEL_LOGS_EXPORTER: "none"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"

# Stable JWT signing secret shared across all Uvicorn workers.
# Leave blank to auto-generate a random value at install time.
# The chart enforces a non-empty JWT_SECRET is supplied to the backend
# (auto-generated if unset) and sets REQUIRE_JWT_SECRET=true so the pod
# refuses to start if the secret is missing at runtime.
jwtSecret: ""

# ── OIDC / OAuth 2.0 authentication ─────────────────────────
oidc:
    enabled: true
    # Full issuer URL — the backend appends /.well-known/openid-configuration.
    issuer: "https://vault.ltc.bcit.ca:8200/v1/identity/oidc/provider/vault-provider"
    # Public client identifier (safe for ConfigMap; not a secret per OAuth 2.0 spec).
    clientId: "hkPdYUJqqEYWxiVwIrgrAjiS8fLja2ip"
    # Client secret — only used when vault.enabled=false and existingSecret is empty.
    # When vault.enabled=true the secret is pulled from Vault via VSO.
    # When existingSecret is set the chart-managed secret is not created at all.
    clientSecret: ""
    # Name of a pre-existing K8s Secret that contains 'client-id' and
    # 'client-secret' keys.  When set, the chart does not create its own
    # OIDC secret — use this to manage the secret outside of Helm/Vault
    # (e.g. kubectl create secret generic <name> ...).  Leave empty to
    # let the chart create the secret from clientId/clientSecret above.
    existingSecret: "hriv-oidc"
    # Backend callback endpoint that the IdP redirects to after authentication.
    redirectUri: "https://hriv.latest.ltc.bcit.ca/api/auth/oidc/callback"
    # Space-separated OAuth 2.0 scopes to request from the IdP.
    scopes: "openid email profile"
    # JSON object mapping IdP group names to HRIV roles (admin/instructor/student).
    roleMapping: '{"bcit-tlu-admins":"admin","bcit-tlu-instructors":"instructor","bcit-tlu-students":"student"}'
    # Frontend URL to redirect to after successful OIDC login.
    postLoginRedirect: "https://hriv.latest.ltc.bcit.ca"
    # Trust email from IdP without requiring email_verified claim.
    # Vault does not emit email_verified; safe for trusted corporate IdP.
    trustEmail: true
    # CORS origins (comma-separated). Used as fallback redirect target when
    # postLoginRedirect is empty.
    corsOrigins: "https://hriv.latest.ltc.bcit.ca"

# CloudNative-PG database cluster
cnpg:
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgresql:16
    database: hriv
    owner: hriv
    devPassword: password1234
    enableSuperuserAccess: true
    storage:
        storageClass: longhorn
        size: 5Gi

# Vault Secrets Operator integration
vault:
    enabled: false
    kvMount: secret
    authRef: vault-auth
    refreshAfter: 1h
    dbAppSecretPath: hriv/db-app
    dbSuperuserSecretPath: hriv/db-superuser
    githubPatSecretPath: hriv/github-pat
    oidcSecretPath: hriv/oidc

# Nginx sidecar for serving /api/tiles directly from the PVC,
# bypassing the Python process.  Tiles are immutable and cache-friendly.
tileSidecar:
    enabled: false
    image: nginx:1.27-alpine
    port: 8001
    resources: {}

persistence:
    enabled: true
    storageClass: longhorn
    size: 10Gi
    accessModes:
        - ReadWriteOnce

resources: {}

# ── High-availability / topology spreading ────────────────────
# When enabled, adds a required pod anti-affinity rule so that no two
# backend replicas land in the same topology zone (e.g. datacenter).
# Requires nodes to be labeled with the chosen topologyKey.
#   kubectl label node <name> topology.kubernetes.io/zone=dtc
#   kubectl label node <name> topology.kubernetes.io/zone=bby
zoneAntiAffinity:
    enabled: false
    topologyKey: topology.kubernetes.io/zone

nodeSelector: {}
tolerations: []
affinity: {}

# ── Initial admin seed (post-install hook) ───────────────────
# When enabled=true, Helm renders a one-shot post-install Job
# (``templates/job-seed-admin.yaml``) that inserts a single admin
# user + bootstrap program on the very first install (``helm.sh/hook:
# post-install`` — not re-run on upgrades or rollbacks).  Opt-in and
# off by default; production deployments should normally rely on
# OIDC group-to-role mapping instead (see ``oidc.roleMapping`` above).
seedAdmin:
    enabled: false
    name: "Admin"
    email: "admin@example.com"
    # bcrypt hash of the desired bootstrap password.
    # Generate with: ``python -c "import bcrypt; print(bcrypt.hashpw(b'<password>', bcrypt.gensalt()).decode())"``
    # Intentionally blank so ``helm install`` fails loudly if seedAdmin is
    # enabled without an operator-supplied password hash.
    passwordHash: ""
