replicaCount: 1

image:
  repository: ghcr.io/bcit-tlu/hriv/hriv-backend
  # Defaults to .Chart.AppVersion; set to a specific release tag (e.g.
  # the version from `helm pull --version <ver>`) for reproducible deploys.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

env:
  SOURCE_IMAGES_DIR: /data/source_images
  TILES_DIR: /data/tiles
  GITHUB_REPO: "bcit-tlu/hriv"

# Mount the ConfigMap published by the hriv-backup chart so
# ``/api/admin/version`` can surface the deployed backup version
# without a manual fleet bump per head build or release.  The backend
# reads the mounted file on every admin version request so kubelet's
# ConfigMap-volume refresh propagates new values without a pod restart.
#
# Precedence at runtime (see backend/app/routers/admin.py):
#   1. ``{mountPath}/{key}`` file contents (this ConfigMap mount)
#   2. ``BACKUP_VERSION`` env var  (legacy / local override)
#   3. ``"dev"``                   (unset fallback for local builds)
#
# Disable the mount (``enabled: false``) to fall back to the env var
# path; leave the ConfigMap name/key aligned with
# ``charts/backup/values.yaml → versionConfigMap``.
backupVersionConfigMap:
  enabled: false
  name: hriv-backup-version
  key: version
  mountPath: /etc/hriv-versions

# Legacy literal override for the backup version.  Only consulted when
# ``backupVersionConfigMap.enabled=false`` or the mounted file is
# missing (e.g. local/dev installs without the backup chart deployed).
# Leave empty to render ``"dev"`` at runtime.
backupVersion: ""

# ── OpenTelemetry observability ─────────────────────────────
# When enabled=true, the backend Deployment renders six OTEL_* env vars
# read by the OpenTelemetry Python SDK / auto-instrumentation (the stable
# image wraps uvicorn with ``opentelemetry-instrument``).  Disabled by
# default so deployments without an OTLP collector don't carry six
# always-empty env vars in the pod spec.
#
# The exporter defaults below are chosen so that setting
# ``otel.enabled=true`` + ``otel.exporterEndpoint`` is sufficient to
# start shipping logs and traces.  Override individual exporters to
# ``"none"`` to disable a specific signal.
otel:
  enabled: false
  serviceName: "hriv-backend"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "otlp"
  exporterEndpoint: ""
  exporterProtocol: "http/protobuf"

# Stable JWT signing secret shared across all Uvicorn workers.
# Leave blank to auto-generate a random value at install time.
# The chart enforces a non-empty JWT_SECRET is supplied to the backend
# (auto-generated if unset) and sets REQUIRE_JWT_SECRET=true so the pod
# refuses to start if the secret is missing at runtime.
jwtSecret: ""

# ── OIDC / OAuth 2.0 authentication ─────────────────────────
# Disabled by default so chart consumers can start with local
# email/password login (see seedAdmin below).  Enable and supply
# issuer + client credentials for SSO.
oidc:
  enabled: false
  # Full issuer URL — the backend appends /.well-known/openid-configuration.
  issuer: ""
  # Public client identifier (safe for ConfigMap; not a secret per OAuth 2.0 spec).
  clientId: ""
  # Client secret — only used when vault.enabled=false and existingSecret is empty.
  # When vault.enabled=true the secret is pulled from Vault via VSO.
  # When existingSecret is set the chart-managed secret is not created at all.
  clientSecret: ""
  # Name of a pre-existing K8s Secret that contains 'client-id' and
  # 'client-secret' keys.  When set, the chart does not create its own
  # OIDC secret — use this to manage the secret outside of Helm/Vault
  # (e.g. kubectl create secret generic <name> ...).  Leave empty to
  # let the chart create the secret from clientId/clientSecret above.
  existingSecret: ""
  # Backend callback endpoint that the IdP redirects to after authentication.
  redirectUri: ""
  # Space-separated OAuth 2.0 scopes to request from the IdP.
  scopes: "openid email profile"
  # JSON object mapping IdP group names to HRIV roles (admin/instructor/student).
  roleMapping: '{}'
  # Frontend URL to redirect to after successful OIDC login.
  postLoginRedirect: ""
  # Trust email from IdP without requiring email_verified claim.
  # Enable when your IdP does not emit the email_verified claim.
  trustEmail: false
  # CORS origins (comma-separated). Used as fallback redirect target when
  # postLoginRedirect is empty.
  corsOrigins: ""

# CloudNative-PG database cluster.
# Set enabled=true to have the chart create a CNPG Cluster resource;
# set enabled=false to bring your own PostgreSQL and supply the
# connection string via cnpg.externalDatabaseUri (or vault.enabled=true).
cnpg:
  enabled: false
  # Full PostgreSQL connection URI for BYO-database deployments.
  # Only used when cnpg.enabled=false AND vault.enabled=false.
  # Example: "postgresql://user:pass@db-host:5432/hriv"
  externalDatabaseUri: ""
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  database: hriv
  owner: hriv
  devPassword: password1234
  enableSuperuserAccess: true
  storage:
    storageClass: longhorn
    size: 5Gi

# ── Redis / arq background worker ────────────────────────────
# When enabled, the chart injects REDIS_URL into the backend pod and
# optionally deploys a dedicated arq worker Deployment that processes
# image-generation and admin tasks off the main API process.
#
# Without Redis the backend gracefully degrades: image processing
# runs in-process via FastAPI BackgroundTasks and login rate limiting
# is disabled.  Enabling Redis adds:
#   • Job persistence — in-flight tasks survive pod restarts
#   • Resource isolation — tile generation runs in a separate worker pod
#   • Login rate limiting — brute-force protection via token bucket
redis:
  enabled: false
  # Full Redis connection URL consumed by the backend (arq + rate limiter).
  # When deploying Redis in-cluster, use the Kubernetes Service DNS name:
  #   redis://hriv-redis-master:6379
  url: "redis://hriv-redis-master:6379"
  # Deploy a dedicated arq worker Deployment alongside the API pod.
  # Requires redis.enabled=true.  When false, background tasks fall back
  # to in-process BackgroundTasks (the existing graceful-degradation path).
  worker:
    enabled: false
    replicaCount: 1
    resources: {}

# ── Issue reporting (GitHub PAT) ─────────────────────────────
# The backend creates GitHub Issues on behalf of end-users via
# POST /api/issues/report.  It needs a GitHub PAT with Issues
# read/write scope on the target repository.
#
# Secret resolution order:
#   1. reportIssue.existingSecret  → operator-managed K8s Secret
#   2. vault.enabled=true          → VSO creates the Secret from Vault KV
#   3. Neither                     → chart creates a placeholder Secret
#                                    (local dev only; token = "someGHtoken")
#
# To supply a real PAT without Vault:
#   kubectl create secret generic hriv-backend-report-issue-pat \
#     --from-literal=token=ghp_YOUR_SCOPED_PAT -n hriv
# then set  reportIssue.existingSecret: hriv-backend-report-issue-pat
reportIssue:
  # Name of a pre-existing K8s Secret containing a 'token' key.
  # When set, the chart does not create its own Secret — use this to
  # manage the PAT outside of Helm/Vault.
  existingSecret: ""

# Vault Secrets Operator integration
vault:
  enabled: false
  kvMount: secret
  authRef: vault-auth
  refreshAfter: 1h
  dbAppSecretPath: hriv/db-app
  dbSuperuserSecretPath: hriv/db-superuser
  reportIssuePatSecretPath: hriv/github-pat
  oidcSecretPath: hriv/oidc

# Nginx sidecar for serving /api/tiles directly from the PVC,
# bypassing the Python process.  Tiles are immutable and cache-friendly.
tileSidecar:
  enabled: false
  image: nginx:1.27-alpine
  port: 8001
  resources: {}

persistence:
  enabled: false
  storageClass: longhorn
  size: 10Gi
  # ReadWriteOnce is fine for single-replica dev/staging.
  # Production with replicaCount > 1 MUST use ReadWriteMany so that
  # background admin task result files written by one pod are accessible
  # from every other pod's download endpoint.
  accessModes:
    - ReadWriteOnce

resources: {}

# ── High-availability / topology spreading ────────────────────
# When enabled, adds a required pod anti-affinity rule so that no two
# backend replicas land in the same topology zone (e.g. datacenter).
# Requires nodes to be labeled with the chosen topologyKey.
#   kubectl label node <name> topology.kubernetes.io/zone=dtc
#   kubectl label node <name> topology.kubernetes.io/zone=bby
zoneAntiAffinity:
  enabled: false
  topologyKey: topology.kubernetes.io/zone

nodeSelector: {}
tolerations: []
affinity: {}

# ── Initial admin seed (post-install hook) ───────────────────
# When enabled=true, Helm renders a one-shot post-install Job
# (``templates/job-seed-admin.yaml``) that inserts a single admin
# user + bootstrap program on the very first install (``helm.sh/hook:
# post-install`` — not re-run on upgrades or rollbacks).
#
# Enabled by default so fresh ``helm install`` runs produce a working
# local admin login even when OIDC isn't wired up yet.  Without this
# seed (and without OIDC), there is no initial user and no way to
# create one through the API (POST /api/users requires admin role).
#
# The default ``passwordHash`` is the same development hash used by
# ``db/seed.sql`` in docker-compose; the operator's very first task
# after the pods are healthy should be to log in as this account and
# rotate the password via the normal change-password flow (or disable
# the account once real admins are created through OIDC).
#
# Set ``seedAdmin.enabled: false`` to skip the Job entirely for
# deployments that rely exclusively on OIDC from day one (see
# ``oidc.roleMapping`` above).
seedAdmin:
  enabled: true
  name: "Haruki Tanaka"
  email: "admin@bcit.ca"
  # bcrypt hash of the bootstrap password.  Defaults to the same
  # development hash shared by docker-compose seed users (intended
  # to be rotated immediately after first login).  Override with
  # ``--set seedAdmin.passwordHash=...`` or in a values file for a
  # stronger initial password.
  # Generate a new hash with:
  #   python -c "import bcrypt; print(bcrypt.hashpw(b'<password>', bcrypt.gensalt()).decode())"
  # Setting this to an empty string while ``enabled: true`` makes
  # ``helm install`` fail loudly at render time rather than silently
  # inserting an unusable empty hash.
  passwordHash: "$2b$12$bD0vGhiySbmr6aqbp.fjeuF9VTVMaGiKOujX2aOoTIRxyjsNc4b2C"
