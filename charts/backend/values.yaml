replicaCount: 1

image:
  repository: ghcr.io/bcit-tlu/corgi-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

env:
  DATABASE_URL: ""
  SOURCE_IMAGES_DIR: /data/source_images
  TILES_DIR: /data/tiles

persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi
  accessModes:
    - ReadWriteOnce

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
