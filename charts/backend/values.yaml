replicaCount: 1

image:
    repository: ghcr.io/bcit-tlu/corgi/backend
    tag: 0.3
    pullPolicy: IfNotPresent

service:
    type: ClusterIP
    port: 8000

env:
    SOURCE_IMAGES_DIR: /data/source_images
    TILES_DIR: /data/tiles
    GITHUB_REPO: "https://github.com/bcit-tlu/corgi"

# Stable JWT signing secret shared across all Uvicorn workers.
# Leave blank to auto-generate a random value at install time.
jwtSecret: ""

# CloudNative-PG database cluster
cnpg:
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgresql:16
    database: corgi
    owner: corgi
    devPassword: password1234
    enableSuperuserAccess: true
    storage:
        storageClass: longhorn
        size: 5Gi

# Vault Secrets Operator integration
vault:
    enabled: false
    kvMount: secret
    authRef: vault-auth
    refreshAfter: 1h
    dbAppSecretPath: corgi/db-app
    dbSuperuserSecretPath: corgi/db-superuser
    githubPatSecretPath: corgi/github-pat

# Nginx sidecar for serving /api/tiles directly from the PVC,
# bypassing the Python process.  Tiles are immutable and cache-friendly.
tileSidecar:
    enabled: false
    image: nginx:1.27-alpine
    port: 8001
    resources: {}

persistence:
    enabled: true
    storageClass: longhorn
    size: 5Gi
    accessModes:
        - ReadWriteOnce

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
