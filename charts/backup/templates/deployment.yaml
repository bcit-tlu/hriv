{{- if not .Values.postgresSecretName }}
{{- fail "postgresSecretName is required — set it to the name of the K8s Secret containing the database URI (key: uri)" }}
{{- end }}
{{- if not .Values.azureSecretName }}
{{- fail "azureSecretName is required — set it to the name of the K8s Secret containing AZURE_STORAGE_CONNECTION_STRING" }}
{{- end }}
{{- $legacyData := .Values.persistence.data | default dict -}}
{{- $sourceImagesEnabled := .Values.persistence.sourceImages.enabled -}}
{{- if and (hasKey $legacyData "enabled") $legacyData.enabled -}}
  {{- $sourceImagesEnabled = $legacyData.enabled -}}
{{- end -}}
{{- $sourceImagesExistingClaim := .Values.persistence.sourceImages.existingClaim -}}
{{- if and (hasKey $legacyData "existingClaim") (not $sourceImagesExistingClaim) -}}
  {{- $sourceImagesExistingClaim = $legacyData.existingClaim -}}
{{- end -}}
{{- $tilesEnabled := eq (include "hriv-backup.tilesEnabled" .) "true" -}}
{{- $backupsEnabled := .Values.persistence.backups.enabled -}}
{{- $hasDataVolumes := or $sourceImagesEnabled $tilesEnabled $backupsEnabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hriv-backup.fullname" . }}
  labels:
    {{- include "hriv-backup.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hriv-backup.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hriv-backup.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["cron"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresSecretName }}
                  key: uri
            # Parity with the backend/frontend containers: expose the
            # deploy-time display version so ``docker inspect`` /
            # ``kubectl describe pod`` surfaces the same
            # ``<ver>-rc.<short>`` (main) or clean ``<ver>`` (retag-
            # promoted) string reported by the admin UI.  ``backup.py``
            # itself does not consume this env var; the version
            # reported under ``/api/admin/version`` is published by the
            # `version-configmap` template and mounted into the
            # backend's pod.
            - name: APP_VERSION
              value: {{ include "hriv-backup.displayVersion" . | quote }}
            - name: DATA_DIR
              value: {{ .Values.env.DATA_DIR | quote }}
            - name: BACKUP_CRON_SCHEDULE
              value: {{ .Values.env.BACKUP_CRON_SCHEDULE | quote }}
            - name: BACKUP_RETENTION_COUNT
              value: {{ .Values.env.BACKUP_RETENTION_COUNT | quote }}
            - name: BACKUP_STALE_HOURS
              value: {{ .Values.env.BACKUP_STALE_HOURS | quote }}
            - name: BACKUP_MODE
              value: {{ .Values.env.BACKUP_MODE | quote }}
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.azureSecretName }}
                  key: AZURE_STORAGE_CONNECTION_STRING
            - name: AZURE_STORAGE_CONTAINER
              value: {{ .Values.env.AZURE_STORAGE_CONTAINER | quote }}
            - name: AZURE_BLOB_PREFIX
              value: {{ .Values.env.AZURE_BLOB_PREFIX | quote }}
            {{- if .Values.observability.openTelemetry.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.openTelemetry.serviceName | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.observability.openTelemetry.exporter.traces | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.observability.openTelemetry.exporter.metrics | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.observability.openTelemetry.exporter.logs | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.openTelemetry.exporter.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.observability.openTelemetry.exporter.protocol | quote }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $hasDataVolumes }}
          volumeMounts:
            {{- if $sourceImagesEnabled }}
            - name: source-images
              mountPath: /data
            {{- end }}
            {{- if $tilesEnabled }}
            - name: tiles
              mountPath: /data/tiles
            {{- end }}
            {{- if $backupsEnabled }}
            - name: backups
              mountPath: /backups
            {{- end }}
          {{- end }}
      {{- if $hasDataVolumes }}
      volumes:
        {{- if $sourceImagesEnabled }}
        - name: source-images
          persistentVolumeClaim:
            claimName: {{ $sourceImagesExistingClaim | default (printf "%s-source-images" (include "hriv-backup.fullname" .)) }}
        {{- end }}
        {{- if $tilesEnabled }}
        - name: tiles
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.tiles.existingClaim | default (printf "%s-tiles" (include "hriv-backup.fullname" .)) }}
        {{- end }}
        {{- if $backupsEnabled }}
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "hriv-backup.fullname" . }}-backups
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity $sourceImagesExistingClaim (and $tilesEnabled .Values.persistence.tiles.existingClaim) }}
      affinity:
        {{- if or $sourceImagesExistingClaim (and $tilesEnabled .Values.persistence.tiles.existingClaim) }}
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ .Values.colocateWithPodLabel }}
              topologyKey: kubernetes.io/hostname
        {{- end }}
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
