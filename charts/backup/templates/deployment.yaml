apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hriv-backup.fullname" . }}
  labels:
    {{- include "hriv-backup.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hriv-backup.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hriv-backup.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["cron"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpgSecretName }}
                  key: uri
            # Parity with the backend/frontend containers: expose the
            # deploy-time display version so ``docker inspect`` /
            # ``kubectl describe pod`` surfaces the same
            # ``<ver>-rc.<short>`` (main) or clean ``<ver>`` (retag-
            # promoted) string reported by the admin UI.  ``backup.py``
            # itself does not consume this env var; the version
            # reported under ``/api/admin/version`` is published by the
            # `version-configmap` template and mounted into the
            # backend's pod.
            - name: APP_VERSION
              value: {{ include "hriv-backup.displayVersion" . | quote }}
            - name: DATA_DIR
              value: {{ .Values.env.DATA_DIR | quote }}
            - name: BACKUP_CRON_SCHEDULE
              value: {{ .Values.env.BACKUP_CRON_SCHEDULE | quote }}
            - name: BACKUP_RETENTION_COUNT
              value: {{ .Values.env.BACKUP_RETENTION_COUNT | quote }}
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ include "hriv-backup.fullname" . }}-azure
                  key: AZURE_STORAGE_CONNECTION_STRING
            - name: AZURE_STORAGE_CONTAINER
              value: {{ .Values.env.AZURE_STORAGE_CONTAINER | quote }}
            - name: AZURE_BLOB_PREFIX
              value: {{ .Values.env.AZURE_BLOB_PREFIX | quote }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.otel.tracesExporter | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.otel.metricsExporter | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.otel.logsExporter | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.otel.exporterProtocol | quote }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.data.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.persistence.backups.enabled }}
            - name: backups
              mountPath: /backups
            {{- end }}
      volumes:
        {{- if .Values.persistence.data.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.existingClaim | default (printf "%s-data" (include "hriv-backup.fullname" .)) }}
        {{- end }}
        {{- if .Values.persistence.backups.enabled }}
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "hriv-backup.fullname" . }}-backups
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity .Values.persistence.data.existingClaim }}
      affinity:
        {{- if .Values.persistence.data.existingClaim }}
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ .Values.colocateWithPodLabel }}
              topologyKey: kubernetes.io/hostname
        {{- end }}
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
