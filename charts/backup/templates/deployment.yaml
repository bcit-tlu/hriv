apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corgi-backup.fullname" . }}
  labels:
    {{- include "corgi-backup.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "corgi-backup.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "corgi-backup.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["cron"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpgSecretName }}
                  key: uri
            - name: DATA_DIR
              value: {{ .Values.env.DATA_DIR | quote }}
            - name: BACKUP_CRON_SCHEDULE
              value: {{ .Values.env.BACKUP_CRON_SCHEDULE | quote }}
            - name: BACKUP_RETENTION_COUNT
              value: {{ .Values.env.BACKUP_RETENTION_COUNT | quote }}
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ include "corgi-backup.fullname" . }}-azure
                  key: AZURE_STORAGE_CONNECTION_STRING
            - name: AZURE_STORAGE_CONTAINER
              value: {{ .Values.env.AZURE_STORAGE_CONTAINER | quote }}
            - name: AZURE_BLOB_PREFIX
              value: {{ .Values.env.AZURE_BLOB_PREFIX | quote }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.data.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.persistence.backups.enabled }}
            - name: backups
              mountPath: /backups
            {{- end }}
      volumes:
        {{- if .Values.persistence.data.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.existingClaim | default (printf "%s-data" (include "corgi-backup.fullname" .)) }}
        {{- end }}
        {{- if .Values.persistence.backups.enabled }}
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "corgi-backup.fullname" . }}-backups
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity .Values.persistence.data.existingClaim }}
      affinity:
        {{- if .Values.persistence.data.existingClaim }}
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ .Values.colocateWithPodLabel }}
              topologyKey: kubernetes.io/hostname
        {{- end }}
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
