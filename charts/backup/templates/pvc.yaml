{{- $legacyData := .Values.persistence.data | default dict -}}
{{- $sourceImagesEnabled := .Values.persistence.sourceImages.enabled -}}
{{- if and (hasKey $legacyData "enabled") $legacyData.enabled -}}
  {{- $sourceImagesEnabled = $legacyData.enabled -}}
{{- end -}}
{{- $sourceImagesExistingClaim := .Values.persistence.sourceImages.existingClaim -}}
{{- if and (hasKey $legacyData "existingClaim") (not $sourceImagesExistingClaim) -}}
  {{- $sourceImagesExistingClaim = $legacyData.existingClaim -}}
{{- end -}}
{{- $sourceImagesStorageClass := .Values.persistence.sourceImages.storageClass -}}
{{- if and (hasKey $legacyData "storageClass") (not $sourceImagesStorageClass) -}}
  {{- $sourceImagesStorageClass = $legacyData.storageClass -}}
{{- end -}}
{{- $sourceImagesSize := .Values.persistence.sourceImages.size -}}
{{- if and (hasKey $legacyData "size") $legacyData.size (eq .Values.persistence.sourceImages.size "5Gi") -}}
  {{- $sourceImagesSize = $legacyData.size -}}
{{- end -}}
{{- $sourceImagesAccessModes := .Values.persistence.sourceImages.accessModes -}}
{{- if and (hasKey $legacyData "accessModes") (gt (len $legacyData.accessModes) 0) (eq (len .Values.persistence.sourceImages.accessModes) 1) (eq (index .Values.persistence.sourceImages.accessModes 0) "ReadWriteOnce") -}}
  {{- $sourceImagesAccessModes = $legacyData.accessModes -}}
{{- end -}}
{{- $tilesEnabled := .Values.persistence.tiles.enabled -}}
{{- if and $sourceImagesExistingClaim (not .Values.persistence.tiles.existingClaim) (hasKey $legacyData "existingClaim") $legacyData.existingClaim .Values.persistence.tiles.enabled -}}
  {{- $tilesEnabled = false -}}
{{- end -}}
{{- if and $sourceImagesEnabled (not $sourceImagesExistingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hriv-backup.fullname" . }}-source-images
  labels:
    {{- include "hriv-backup.labels" . | nindent 4 }}
spec:
  {{- if $sourceImagesStorageClass }}
  storageClassName: {{ $sourceImagesStorageClass }}
  {{- end }}
  accessModes:
    {{- range $sourceImagesAccessModes }}
    - {{ . }}
    {{- end }}
  resources:
    requests:
      storage: {{ $sourceImagesSize }}
{{- end }}
---
{{- if and $tilesEnabled (not .Values.persistence.tiles.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hriv-backup.fullname" . }}-tiles
  labels:
    {{- include "hriv-backup.labels" . | nindent 4 }}
spec:
  {{- if .Values.persistence.tiles.storageClass }}
  storageClassName: {{ .Values.persistence.tiles.storageClass }}
  {{- end }}
  accessModes:
    {{- range .Values.persistence.tiles.accessModes }}
    - {{ . }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.tiles.size }}
{{- end }}
---
{{- if .Values.persistence.backups.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hriv-backup.fullname" . }}-backups
  labels:
    {{- include "hriv-backup.labels" . | nindent 4 }}
spec:
  {{- if .Values.persistence.backups.storageClass }}
  storageClassName: {{ .Values.persistence.backups.storageClass }}
  {{- end }}
  accessModes:
    {{- range .Values.persistence.backups.accessModes }}
    - {{ . }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.backups.size }}
{{- end }}
