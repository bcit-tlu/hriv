{{- if .Values.vault.enabled }}
# VSO static secret for S3 credentials used by the backup service.
# Vault path should contain keys: S3_ACCESS_KEY, S3_SECRET_KEY
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "corgi-backup.fullname" . }}-s3
  labels:
    {{- include "corgi-backup.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.kvMount }}
  path: {{ .Values.vault.s3SecretPath }}
  vaultAuthRef: {{ .Values.vault.authRef }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  destination:
    name: {{ include "corgi-backup.fullname" . }}-s3
    create: true
{{- end }}
