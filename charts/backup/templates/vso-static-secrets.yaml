{{- if .Values.vault.enabled }}
# VSO static secret for Azure Blob Storage credentials used by the backup service.
# Vault path should contain key: AZURE_STORAGE_CONNECTION_STRING
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "corgi-backup.fullname" . }}-azure
  labels:
    {{- include "corgi-backup.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.kvMount }}
  path: {{ .Values.vault.azureSecretPath }}
  vaultAuthRef: {{ .Values.vault.authRef }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  destination:
    name: {{ include "corgi-backup.fullname" . }}-azure
    create: true
{{- end }}
