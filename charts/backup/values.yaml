image:
  repository: ghcr.io/bcit-tlu/hriv/hriv-backup
  tag: '' # Defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Exposes Chart.AppVersion as a ConfigMap so the hriv-backend chart can
# mount it and surface the deployed backup version via /api/admin/version.
# CI stamps Chart.AppVersion on every helm-publish (see the helm-publish
# step of .github/workflows/ci.yaml) so this value is automatically
# kept in sync with head builds, rc tags, and full releases — no manual
# fleet bump is ever required.
versionConfigMap:
  enabled: true
  name: hriv-backup-version
  key: version
  imageTagKey: image-tag

# Name of the backend chart Secret containing the database URI.
# Defaults to the Secret created by the backend chart.
postgresSecretName: postgres-db-credentials

# Name of the Kubernetes Secret containing the Azure Storage connection string.
# Defaults to the Secret created by this chart when vault.enabled is false.
azureSecretName: azure-storage-credentials

# Pod label used for pod affinity when sharing the backend's RWO data PVC.
# Ensures the backup pod is co-located on the same node as the backend.
colocateWithPodLabel: hriv-backend

env:
  DATA_DIR: /data
  BACKUP_CRON_SCHEDULE: '0 2 * * *'
  BACKUP_RETENTION_COUNT: '30'
  BACKUP_STALE_HOURS: '26'
  # BACKUP_MODE controls what the Python backup service archives and restores:
  # - development: DB + source images + generated tiles (for local/manual use)
  # - production:  DB + source images only; generated tiles are excluded and
  #                must be protected by Longhorn snapshots/backups or rebuilt
  #                from source images using the rebuild-tiles admin task.
  # The chart default is production; override to development for local or manual use.
  BACKUP_MODE: 'production'
  AZURE_STORAGE_CONTAINER: ''
  AZURE_BLOB_PREFIX: hriv-backups

# ── OpenTelemetry observability ─────────────────────────────
# When enabled=true, the backup Deployment renders OTEL_* env vars
# read by the OpenTelemetry Python SDK / auto-instrumentation (the
# image wraps ``backup.py`` with ``opentelemetry-instrument``).
# Disabled by default so deployments without an OTLP collector don't
# carry always-empty env vars in the pod spec.
#
# The exporter defaults below are chosen so that setting
# ``observability.openTelemetry.enabled=true`` +
# ``observability.openTelemetry.exporter.endpoint`` is sufficient to
# start shipping logs and traces. Override individual exporters to
# ``"none"`` to disable a specific signal.
observability:
  openTelemetry:
    enabled: false
    serviceName: 'hriv-backup'
    exporter:
      traces: 'otlp'
      metrics: 'none'
      logs: 'otlp'
      endpoint: ''
      protocol: 'http/protobuf'

# Vault Secrets Operator integration.
# Disabled by default so standalone chart users are not required to use Vault.
# Override to true in Flux overlays (flux-fleet) for org deployments.
vault:
  enabled: false
  azureSecretPath: hriv/azure-storage

persistence:
  # Deprecated legacy single-data-PVC keys kept for upgrade compatibility.
  data: {}
  sourceImages:
    enabled: true
    existingClaim: '' # Set to the backend source-images PVC to share /data
    # Leave empty to use the cluster default StorageClass.
    storageClass: ''
    size: 5Gi
    accessModes:
      - ReadWriteOnce
  tiles:
    enabled: true # Ignored while BACKUP_MODE=production (the chart default).
    existingClaim: '' # Set to the backend tiles PVC to share /data/tiles in development mode.
    # Leave empty to use the cluster default StorageClass.
    storageClass: ''
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  backups:
    enabled: true
    # Leave empty to use the cluster default StorageClass.
    storageClass: ''
    size: 10Gi
    accessModes:
      - ReadWriteOnce

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
