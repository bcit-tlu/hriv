image:
  repository: ghcr.io/bcit-tlu/corgi-backup
  tag: latest
  pullPolicy: IfNotPresent

# Name of the CNPG-generated Secret containing the database URI.
# This is the <cluster>-app secret created by the backend chart's CNPG Cluster.
cnpgSecretName: corgi-backend-db-app

# Pod label used for pod affinity when sharing the backend's RWO data PVC.
# Ensures the backup pod is co-located on the same node as the backend.
colocateWithPodLabel: corgi-backend

env:
  DATA_DIR: /data
  BACKUP_CRON_SCHEDULE: "0 2 * * *"
  BACKUP_RETENTION_COUNT: "30"
  AZURE_STORAGE_CONTAINER: ""
  AZURE_BLOB_PREFIX: corgi-backups

# Vault Secrets Operator integration
vault:
  enabled: true
  kvMount: secret
  authRef: vault-auth
  refreshAfter: 1h
  azureSecretPath: corgi/azure-storage

persistence:
  data:
    enabled: true
    existingClaim: ""  # Set to backend PVC name to share its data volume
    storageClass: longhorn
    size: 5Gi
    accessModes:
      - ReadWriteOnce
  backups:
    enabled: true
    storageClass: longhorn
    size: 10Gi
    accessModes:
      - ReadWriteOnce

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
