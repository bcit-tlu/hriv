image:
  repository: ghcr.io/bcit-tlu/corgi-backup
  tag: latest
  pullPolicy: IfNotPresent

env:
  DATABASE_URL: ""
  DATA_DIR: /data
  BACKUP_CRON_SCHEDULE: "0 2 * * *"
  BACKUP_RETENTION_COUNT: "30"
  S3_ENDPOINT: ""
  S3_BUCKET: ""
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  S3_REGION: us-east-1
  S3_PREFIX: corgi-backups

persistence:
  data:
    enabled: true
    storageClass: longhorn
    size: 5Gi
    accessModes:
      - ReadWriteOnce
  backups:
    enabled: true
    storageClass: longhorn
    size: 10Gi
    accessModes:
      - ReadWriteOnce

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
