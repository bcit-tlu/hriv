global:
  scrape_interval: 15s
  evaluation_interval: 15s

remote_write:
  - url: 'http://localhost:9090/api/v1/write'

storage:
  tsdb:
    retention.time: 7d
    retention.size: 1GB

enable_features:
  - remote-write-receiver

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
