apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Flux envsubst replaces variables found in `deploy-vars.env` or falls back to defaults
#
namespace: ${DEPLOY_NAMESPACE:=corgi}

commonLabels:
  environment: review

# Prefix/Suffix required for VaultAuth configuration
#
namePrefix: corgi-
nameSuffix: -review

# Facilitate kustomization name updating
#
configurations:
  - kustomizeconfig.yaml

commonAnnotations:
  version: ${GIT_TAG:=stable}

images:
  - name: corgi
    newName: ${IMAGE_NAME:=registry.ltc.bcit.ca/web-apps/corgi/corgi}
    newTag: ${IMAGE_TAG:=stable}

# Patches ingress with branch name as the subdomain"
#
patches:
  - path: ingress-patch.yaml
    target:
      kind: Ingress

  # Adjusts secrets for review branches
  - target:
      kind: Deployment
    path: deployment-patch.yaml

  # Incorporate vault-secrets
  #
  # adds `-review` suffix to VaultAuth `spec.mount`
  - target:
      kind: VaultAuth
    path: vault-secrets-review/vault-auth-patch.yaml

components:
  # Include environment-specific secrets
  # - ./vault-secrets-review # - No review branch secrets

  # Required for VaultAuth role and serviceaccounts
  - ../../base/components/vault-auth

configMapGenerator:
  # Can switch to testing bucket for images
  #
  - name: aws-config
    literals:
      - AWS_BUCKET=corgi-test-bucket-2020-06-29
    behavior: merge

  # Updates nginx config with overlay-specific `fastcgi_pass` service name
  - name: nginx-config
    files:
      - conf.d/nginx/default.conf
    behavior: replace
