server {

    # This file should match the one in the base `conf.d` directory EXCEPT for the `fastcgi_pass` name, which is specific to the overlay
    listen 8080 default_server;
    server_name _;

    index index.php index.html;

    root /var/www/html/public;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass corgi-service-review:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 600;
        fastcgi_buffers 8 128k;
        fastcgi_buffer_size 128k;
    }

    # Additional custom parameters

    # location ~* ^\/(?!clouds\/).+\.(ico|css|js|gif|jpe?g|png)(\?[0-9]+)?$ {
    location ~* \.(ico|css|js|gif|jpe?g|png)(\?[0-9]+)?$ {
        expires max;
        log_not_found off;
    }

    client_header_timeout 6000;
    client_body_timeout 6000;
    fastcgi_read_timeout 6000;
    client_max_body_size 4000M;

}