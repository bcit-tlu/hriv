apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - alt-endpoint.yaml
  # Backups only performed on stable
  #
  - db-backup-cronjob.yaml
commonLabels:
  environment: stable
# Prefix/Suffix required for VaultAuth configuration
#
namePrefix: corgi-
nameSuffix: -stable
# Teach kustomize how to update generated names
#
configurations:
  - kustomizeconfig.yaml
commonAnnotations:
  version: 1.2.8 # {"$imagepolicy": "corgi:corgi-image-policy-stable:tag"}
images:
  - name: "corgi"
    newName: "registry.ltc.bcit.ca/web-apps/corgi/corgi"
    newTag: "1.2.8" # {"$imagepolicy": "corgi:corgi-image-policy-stable:tag"}
patches:
  # Patches deployment with secrets
  - target:
      kind: Deployment
    path: deployment-patch.yaml
  # Adds secrets to statefulset
  - target:
      kind: StatefulSet
    path: statefulset-patch.yaml
  # Incorporate vault-secrets
  #
  # adds `-latest` suffix to VaultAuth `spec.mount`
  - target:
      kind: VaultAuth
    path: vault-secrets-stable/vault-auth-patch.yaml
components:
  # Include environment-specific secrets
  - ./vault-secrets-stable
  # Required for VaultAuth role and serviceaccounts
  - ../../base/components/vault-auth
configMapGenerator:
  # Updates elasticapm config
  - name: elasticapm-config
    literals:
      - ELASTIC_APM_SERVICE_NAME=corgi-stable
    behavior: merge
  # Updates nginx config with overlay-specific `fastcgi_pass` service name
  - name: nginx-config
    files:
      - conf.d/nginx/default.conf
    behavior: replace
