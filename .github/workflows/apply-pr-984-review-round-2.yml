name: Apply PR 984 review round 2

on:
  push:
    branches:
      - agent/fix-fabric-textbox-resizing

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply review fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path('frontend/src/components/CanvasOverlay.tsx')
          source = source_path.read_text()

          replacements = [
              (
                  "const lines = wrapCanvasText(ctx, text, Math.abs(pw))",
                  "const lines = wrapCanvasText(ctx, text, Math.max(MIN_TEXTBOX_WIDTH, Math.abs(pw)))",
              ),
              (
                  """        const aObj = text as AnnotatedObject
""",
                  """        text.set({ height: Math.max(1, Math.abs(ph)) })
        const aObj = text as AnnotatedObject
""",
              ),
          ]

          for old, new in replacements:
              if source.count(old) != 1:
                  raise SystemExit(f'Expected one source match for {old!r}, found {source.count(old)}')
              source = source.replace(old, new, 1)

          source_path.write_text(source)

          test_path = Path('frontend/tests/components/CanvasOverlay.test.tsx')
          tests = test_path.read_text()

          replacements = [
              (
                  """    this.set = vi.fn()
    this.controls = createObjectDefaultControls()
""",
                  """    this.set = vi.fn((values: Record<string, unknown>) => Object.assign(this, values))
    this.controls = createObjectDefaultControls()
""",
              ),
              (
                  """      const initialScaleY = text.scaleY ?? 1
      text.controls.mb.actionHandler({}, { target: text }, 0, 260)
      expect(text.height).toBe(260)
      expect(text.scaleY ?? 1).toBe(initialScaleY)
""",
                  """      const initialScaleY = text.scaleY ?? 1
      text.controls.mt.actionHandler({}, { target: text }, 0, -220)
      expect(text.height).toBe(220)
      expect(text.scaleY ?? 1).toBe(initialScaleY)

      text.controls.mb.actionHandler({}, { target: text }, 0, 260)
      expect(text.height).toBe(260)
      expect(text.scaleY ?? 1).toBe(initialScaleY)
""",
              ),
              (
                  """      expect(text.width).toBe(250)
      expect(text.controls.mt.actionHandler).toBe(fabric.controlsUtils.changeHeight)
""",
                  """      expect(text.width).toBe(250)
      expect(text.height).toBe(50)
      expect(text.controls.mt.actionHandler).toBe(fabric.controlsUtils.changeHeight)
""",
              ),
          ]

          for old, new in replacements:
              if tests.count(old) != 1:
                  raise SystemExit(f'Expected one test match for {old!r}, found {tests.count(old)}')
              tests = tests.replace(old, new, 1)

          test_path.write_text(tests)
          PY

          rm .github/workflows/apply-pr-984-review-round-2.yml

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npx prettier --write src/components/CanvasOverlay.tsx tests/components/CanvasOverlay.test.tsx
          npm run format:check
          npm test -- --run tests/components/CanvasOverlay.test.tsx
          npm run build

      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/src/components/CanvasOverlay.tsx frontend/tests/components/CanvasOverlay.test.tsx .github/workflows/apply-pr-984-review-round-2.yml
          git commit -m 'Preserve text box dimensions across modes'
          git push

# Existing-on-branch trigger
