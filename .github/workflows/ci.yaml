name: build

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: frontend
            context: ./frontend
            target: stable
            build_contexts: |
              nginx-config=./charts/frontend/files
            extra_watch_paths: ./charts/frontend/files
          - component: backend
            context: ./backend
            target: stable
          - component: backup
            context: ./backup

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}
          fi

          if git diff --quiet $BASE $HEAD -- ${{ matrix.context }} ${{ matrix.extra_watch_paths }}; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.changes.outputs.changed == 'true'

      - uses: docker/login-action@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        if: steps.changes.outputs.changed == 'true'
        run: |
          COMPONENT=${{ matrix.component }}

          TAG=$(git describe --tags --match "${COMPONENT}-v*" --abbrev=0 2>/dev/null || echo "${COMPONENT}-v0.0.0")
          VERSION=${TAG#${COMPONENT}-v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          COMMITS=$(git log "${TAG}..HEAD" --pretty=format:"%s%n%b" -- ${{ matrix.context }})

          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|!:"; then
            ((MAJOR+=1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            ((MINOR+=1)); PATCH=0
          else
            ((PATCH+=1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          TS=$(date -u +"%Y%m%d%H%M%S")

          echo "next=${NEXT}" >> $GITHUB_OUTPUT
          echo "short=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "ts=${TS}" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          build-contexts: ${{ matrix.build_contexts || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}:${{ steps.version.outputs.next }}-${{ steps.version.outputs.short }}.${{ steps.version.outputs.ts }}
