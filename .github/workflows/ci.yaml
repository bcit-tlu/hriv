name: "[CI] Test, build & publish"

# Readable run titles in the Actions UI: PR runs show the PR number and
# title; main pushes show the head commit subject.
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('PR #{0} — {1}', github.event.pull_request.number, github.event.pull_request.title)
      || format('Head build — {0}', github.event.head_commit.message) }}

on:
  push:
    branches: [main]
  # Scope PR runs to PRs targeting `main` only; bare `pull_request:` fires
  # for PRs against any base branch, which isn't what this workflow is
  # meant to gate.
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least-privilege default: only read access at the workflow level.
# Jobs that need more elevate locally.
permissions:
  contents: read

jobs:
  # ── Quality gates ─────────────────────────────────────────
  #
  # Tests, lint, and coverage run on every push + PR in parallel.
  # Each component's build job gates on its own quality-gate job;
  # helm-lint runs independently (its failure breaks the workflow
  # status but does not block individual image builds).

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure in-project virtualenv
        run: poetry config virtualenvs.in-project true

      - uses: actions/cache@v5
        with:
          path: backend/.venv
          key: backend-venv-py3.13-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: backend-venv-py3.13-

      - name: Install dependencies
        run: poetry install --with dev

      # Coverage gate (≥ 80 %) is enforced via `addopts` in pyproject.toml.
      - name: Run pytest with coverage
        run: poetry run pytest

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: frontend-npm-${{ hashFiles('frontend/package.json') }}

      # `frontend/package-lock.json` is in `.gitignore`, so use
      # `npm install` rather than `npm ci`.
      - name: Install dependencies
        run: npm install

      # Advisory until pre-existing lint errors are resolved; promote to
      # blocking by removing `continue-on-error` once clean.
      - name: Lint (ESLint)
        continue-on-error: true
        run: npm run lint

      # Coverage thresholds are enforced via `test.coverage.thresholds`
      # in frontend/vite.config.ts — vitest exits non-zero if any
      # threshold is breached.
      - name: Test with coverage (Vitest)
        run: npm run test:coverage

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform

      - name: Lint, template-render & validate all charts
        run: |
          for chart in charts/*/; do
            name=$(basename "$chart")
            echo "::group::${name}"
            helm lint "$chart"
            helm template test "$chart" \
              | kubeconform -strict -summary \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                  -ignore-missing-schemas
            echo "::endgroup::"
          done

  # ── Container images ──────────────────────────────────────
  #
  # Each component gets its own build job gated on the relevant
  # quality-gate job.  This gives every component an independent
  # GitHub status check that can be individually required in
  # branch protection — a backend regression no longer blocks
  # PRs that only touch frontend code (and vice versa).
  #
  # The shared reusable workflow handles checkout, change
  # detection, Docker build/push, Cosign signing, and Trivy
  # scanning.
  #
  # `helm-lint` is intentionally NOT in `needs` — it runs as an
  # independent parallel job whose failure surfaces via branch
  # protection (required status check) rather than delaying or
  # blocking image builds.

  build-frontend:
    needs: [frontend-checks]
    uses: bcit-tlu/.github/.github/workflows/oci-build.yaml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: read
    with:
      component: frontend
      image_name: hriv-frontend
      context: ./frontend
      target: stable
      build_contexts: "nginx-config=./charts/frontend/files"
      extra_watch_paths: ./charts/frontend/files
      trivyignore: .trivyignore
    secrets: inherit

  build-backend:
    needs: [backend-tests]
    uses: bcit-tlu/.github/.github/workflows/oci-build.yaml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: read
    with:
      component: backend
      image_name: hriv-backend
      context: ./backend
      target: stable
      trivyignore: .trivyignore
    secrets: inherit

  build-backup:
    needs: [backend-tests]
    uses: bcit-tlu/.github/.github/workflows/oci-build.yaml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: read
    with:
      component: backup
      image_name: hriv-backup
      context: ./backup
      target: stable
      trivyignore: .trivyignore
    secrets: inherit

  # ── Helm charts → OCI registry (main push) ─────────────────
  #
  # Publishes each component's chart with the same RC version that
  # the corresponding image received, so chart and app tags stay
  # in lockstep.  Only runs on main pushes; skips components with
  # no changes.  Release-time chart publishing is handled by
  # helm-publish.yaml.

  helm-publish:
    needs: [helm-lint, build-frontend, build-backend, build-backup]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write          # Cosign keyless (Sigstore OIDC)
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - uses: sigstore/cosign-installer@v3

      - name: Cosign login (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            cosign login "${{ env.REGISTRY }}" \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Helm login (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login "${{ env.REGISTRY }}" \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Package, push & sign charts
        shell: bash
        env:
          FRONTEND_VERSION: ${{ needs.build-frontend.outputs.rc_version }}
          BACKEND_VERSION: ${{ needs.build-backend.outputs.rc_version }}
          BACKUP_VERSION: ${{ needs.build-backup.outputs.rc_version }}
        run: |
          set -euo pipefail

          OCI_BASE="oci://${{ env.REGISTRY }}/${{ github.repository }}/charts"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ github.repository }}/charts"

          declare -A VERSIONS=(
            [frontend]="${FRONTEND_VERSION}"
            [backend]="${BACKEND_VERSION}"
            [backup]="${BACKUP_VERSION}"
          )

          for component in frontend backend backup; do
            VERSION="${VERSIONS[$component]}"
            if [[ -z "${VERSION}" ]]; then
              echo "No RC version for ${component} (no changes); skipping."
              continue
            fi

            CHART_DIR="charts/${component}"
            CHART_NAME=$(awk '/^name:/{print $2; exit}' "${CHART_DIR}/Chart.yaml")
            DEST_DIR="/tmp/charts"
            mkdir -p "${DEST_DIR}"

            echo "::group::${CHART_NAME} ${VERSION}"

            helm dependency update "${CHART_DIR}" || true

            helm package "${CHART_DIR}" \
              --version "${VERSION}" \
              --app-version "${VERSION}" \
              -d "${DEST_DIR}"

            PUSH_OUT=$(helm push \
              "${DEST_DIR}/${CHART_NAME}-${VERSION}.tgz" \
              "${OCI_BASE}" 2>&1) || true
            echo "${PUSH_OUT}"
            printf '%s\n' "${PUSH_OUT}" | grep -q '^Digest:' || { echo "::error::helm push failed for ${CHART_NAME}"; exit 1; }

            DIGEST=$(printf '%s\n' "${PUSH_OUT}" | awk '/^Digest:/{print $2}')
            if [[ -n "${DIGEST}" ]]; then
              cosign sign --yes "${IMAGE_BASE}/${CHART_NAME}@${DIGEST}"
            fi

            echo "::endgroup::"
          done
