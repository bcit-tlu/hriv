name: "[CI] Test, build & publish"

# Readable run titles in the Actions UI: PR runs show the PR number and
# title; main pushes show the head commit subject.
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('PR #{0} — {1}', github.event.pull_request.number, github.event.pull_request.title)
      || format('Head build — {0}', github.event.head_commit.message) }}

on:
  push:
    branches: [main]
  # Scope PR runs to PRs targeting `main` only; bare `pull_request:` fires
  # for PRs against any base branch, which isn't what this workflow is
  # meant to gate.
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least-privilege default: only read access at the workflow level.
# Jobs that need more elevate locally.
permissions:
  contents: read

jobs:
  # ── Quality gates ─────────────────────────────────────────
  #
  # Tests, lint, and coverage run on every push + PR in parallel.
  # Each build matrix entry gates on its own quality-gate job;
  # helm-lint runs independently (its failure breaks the workflow
  # status but does not block individual image builds).

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure in-project virtualenv
        run: poetry config virtualenvs.in-project true

      - uses: actions/cache@v4
        with:
          path: backend/.venv
          key: backend-venv-py3.13-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: backend-venv-py3.13-

      - name: Install dependencies
        run: poetry install --with dev

      # Coverage gate (≥ 80 %) is enforced via `addopts` in pyproject.toml.
      - name: Run pytest with coverage
        run: poetry run pytest

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-npm-${{ hashFiles('frontend/package.json') }}

      # `frontend/package-lock.json` is in `.gitignore`, so use
      # `npm install` rather than `npm ci`.
      - name: Install dependencies
        run: npm install

      # Advisory until pre-existing lint errors are resolved; promote to
      # blocking by removing `continue-on-error` once clean.
      - name: Lint (ESLint)
        continue-on-error: true
        run: npm run lint

      # Coverage thresholds are enforced via `test.coverage.thresholds`
      # in frontend/vite.config.ts — vitest exits non-zero if any
      # threshold is breached.
      - name: Test with coverage (Vitest)
        run: npm run test:coverage

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform

      - name: Lint, template-render & validate all charts
        run: |
          for chart in charts/*/; do
            name=$(basename "$chart")
            echo "::group::${name}"
            helm lint "$chart"
            helm template test "$chart" \
              | kubeconform -strict -summary \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                  -ignore-missing-schemas
            echo "::endgroup::"
          done

  # ── Container images (matrix: frontend, backend, backup) ──
  #
  # Each matrix entry only requires its own quality gate to pass.
  # `!cancelled()` prevents a sibling gate failure from blocking
  # unrelated components. The per-component `gate` field is checked
  # in the first step to skip early when *this* component's gate failed.
  build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks, helm-lint]
    if: "!cancelled()"
    permissions:
      contents: read
      packages: write
      id-token: write          # Cosign keyless (Sigstore OIDC)
      security-events: write   # Trivy SARIF upload to GitHub Security tab
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            context: ./frontend
            target: stable
            build_contexts: |
              nginx-config=./charts/frontend/files
            extra_watch_paths: ./charts/frontend/files
            gate: frontend-checks
          - component: backend
            context: ./backend
            target: stable
            gate: backend-tests
          - component: backup
            context: ./backup
            target: stable
            gate: backend-tests

    steps:
      - name: Check own quality gate
        id: gate
        shell: bash
        run: |
          result="${{ needs[matrix.gate].result }}"
          echo "gate=${{ matrix.gate }} result=${result}"
          if [[ "${result}" != "success" ]]; then
            echo "::error::Quality gate '${{ matrix.gate }}' did not succeed (result=${result}); skipping ${{ matrix.component }} build."
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.passed == 'true'
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        if: steps.gate.outputs.passed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # `github.event.before` is the all-zeroes SHA on first pushes
          # to a new ref (and occasionally missing from the local clone
          # on force-pushes / history edits). Fall back to HEAD~1 when
          # available so `git diff` doesn't abort the job; if HEAD has
          # no parent (initial commit), treat everything as changed.
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [[ -z "${BASE}" || "${BASE}" == "${ZERO_SHA}" ]] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            if git rev-parse --verify "${HEAD}^" >/dev/null 2>&1; then
              BASE="${HEAD}^"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if git diff --quiet "${BASE}" "${HEAD}" -- ${{ matrix.context }} ${{ matrix.extra_watch_paths }}; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.changes.outputs.changed == 'true'

      - uses: docker/login-action@v4
        if: steps.changes.outputs.changed == 'true' && github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          COMPONENT=${{ matrix.component }}

          TAG=$(git describe --tags \
            --match "${COMPONENT}-v*" \
            --exclude "${COMPONENT}-v*-*" \
            --abbrev=0 2>/dev/null || true)
          if [[ -z "$TAG" ]]; then
            VERSION="0.0.0"
            RANGE="HEAD"
          else
            VERSION="${TAG#${COMPONENT}-v}"
            RANGE="${TAG}..HEAD"
          fi

          if ! [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Refusing to bump from non-semver base version '${VERSION}' (tag '${TAG}')"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          SUBJECTS=$(git log "${RANGE}" --pretty=format:"%s" -- ${{ matrix.context }})
          BODIES=$(git log "${RANGE}" --pretty=format:"%b" -- ${{ matrix.context }})

          if echo "$SUBJECTS" | grep -qE "^[a-zA-Z]+(\([^)]+\))?!:" \
             || echo "$BODIES" | grep -qE "^BREAKING[ -]CHANGE:"; then
            ((MAJOR+=1)); MINOR=0; PATCH=0
          elif echo "$SUBJECTS" | grep -qE "^feat(\(.+\))?:"; then
            ((MINOR+=1)); PATCH=0
          else
            ((PATCH+=1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Numerical timestamp suffix used by Flux ImagePolicy
          # (extract=numerical, pattern captures $ts) to sort
          # `latest`-env images by build recency. Embedded in the
          # primary tag so Flux picks the newest image unambiguously
          # even across re-runs of the same commit. Fixed-width
          # 14-char format also sorts lexically, so SemVer
          # prerelease comparison of the same `-rc.` identifier
          # across different timestamps produces the right order.
          TS=$(date -u +"%Y%m%d%H%M%S")

          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ts=${TS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build-push
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          build-contexts: ${{ matrix.build_contexts || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          # PR builds don't push to the registry, but load locally so
          # the Trivy step can scan the image by tag.
          load: ${{ github.event_name == 'pull_request' }}
          # Skip SLSA provenance + SBOM attestations so each push
          # produces a single image manifest per tag (two tags total:
          # versioned + full-sha). Without this, buildx creates an
          # extra unnamed attestation manifest alongside every tag,
          # doubling the artifacts visible under ghcr's package view.
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          # Commit identity travels with the image as OCI manifest
          # labels rather than baked build-time `ARG`s. Labels survive
          # `release-retag.yaml`'s digest-promotion so
          # `docker buildx imagetools inspect` always recovers the
          # exact commit an image was built from.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.next }}-rc.${{ steps.version.outputs.short }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}:${{ steps.version.outputs.next }}-rc.${{ steps.version.outputs.ts }}.${{ steps.version.outputs.short }}

      # ── Sign with Cosign (keyless / Sigstore) ──────────────
      - uses: sigstore/cosign-installer@v3
        if: steps.changes.outputs.changed == 'true' && github.event_name != 'pull_request'

      - name: Sign image
        if: steps.changes.outputs.changed == 'true' && github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}@${{ steps.build-push.outputs.digest }}

      # ── Trivy vulnerability scan ───────────────────────────
      #
      # Runs on every build so regressions surface on the PR that
      # introduces them rather than after merge to main.
      #
      #   * main pushes: scan by digest, upload SARIF to Security tab.
      #     `ignore-unfixed` disabled for full inventory/audit.
      #   * PRs: scan locally loaded image by tag. `ignore-unfixed: true`
      #     trims noise to CVEs with an upstream fix. Advisory today
      #     (exit-code 0) — flip to 1 once base-image CVEs are resolved.
      - name: Resolve image reference for Trivy
        id: scan-ref
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}@${{ steps.build-push.outputs.digest }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan image (PR — table to log)
        if: steps.changes.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          # TODO: flip to '1' once base-image cleanup lands.
          exit-code: "0"

      - name: Scan image (main — SARIF to Security tab)
        if: steps.changes.outputs.changed == 'true' && github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          trivyignores: .trivyignore
          exit-code: "0"

      - name: Upload scan results to GitHub Security
        if: steps.changes.outputs.changed == 'true' && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}
