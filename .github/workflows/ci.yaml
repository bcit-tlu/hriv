name: build

on:
  push:
    branches: [main]
  # Scope PR runs to PRs targeting `main` only; bare `pull_request:` fires
  # for PRs against any base branch, which isn't what this workflow is
  # meant to gate.
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

# Least-privilege default: only read access at the workflow level.
# Jobs that push to GHCR elevate `packages: write` locally.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # `packages: write` is required for `docker login ghcr.io` + push;
    # scoped to this job so PR runs never use it even though they share
    # the same build step (push: false on pull_request events).
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            context: ./frontend
            target: stable
            build_contexts: |
              nginx-config=./charts/frontend/files
            extra_watch_paths: ./charts/frontend/files
          - component: backend
            context: ./backend
            target: stable
          - component: backup
            context: ./backup
            target: stable

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # `github.event.before` is the all-zeroes SHA on first pushes
          # to a new ref (and occasionally missing from the local clone
          # on force-pushes / history edits). Fall back to HEAD~1 when
          # available so `git diff` doesn't abort the job; if HEAD has
          # no parent (initial commit), treat everything as changed.
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [[ -z "${BASE}" || "${BASE}" == "${ZERO_SHA}" ]] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            if git rev-parse --verify "${HEAD}^" >/dev/null 2>&1; then
              BASE="${HEAD}^"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if git diff --quiet "${BASE}" "${HEAD}" -- ${{ matrix.context }} ${{ matrix.extra_watch_paths }}; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.changes.outputs.changed == 'true'

      - uses: docker/login-action@v4
        if: steps.changes.outputs.changed == 'true' && github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          COMPONENT=${{ matrix.component }}

          TAG=$(git describe --tags \
            --match "${COMPONENT}-v*" \
            --exclude "${COMPONENT}-v*-*" \
            --abbrev=0 2>/dev/null || true)
          if [[ -z "$TAG" ]]; then
            VERSION="0.0.0"
            RANGE="HEAD"
          else
            VERSION="${TAG#${COMPONENT}-v}"
            RANGE="${TAG}..HEAD"
          fi

          if ! [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Refusing to bump from non-semver base version '${VERSION}' (tag '${TAG}')"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          SUBJECTS=$(git log "${RANGE}" --pretty=format:"%s" -- ${{ matrix.context }})
          BODIES=$(git log "${RANGE}" --pretty=format:"%b" -- ${{ matrix.context }})

          if echo "$SUBJECTS" | grep -qE "^[a-zA-Z]+(\([^)]+\))?!:" \
             || echo "$BODIES" | grep -qE "^BREAKING[ -]CHANGE:"; then
            ((MAJOR+=1)); MINOR=0; PATCH=0
          elif echo "$SUBJECTS" | grep -qE "^feat(\(.+\))?:"; then
            ((MINOR+=1)); PATCH=0
          else
            ((PATCH+=1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Numerical timestamp suffix used by Flux ImagePolicy
          # (extract=numerical, pattern captures $ts) to sort
          # `latest`-env images by build recency. Embedded in the
          # primary tag so Flux picks the newest image unambiguously
          # even across re-runs of the same commit. Fixed-width
          # 14-char format also sorts lexically, so SemVer
          # prerelease comparison of the same `-rc.` identifier
          # across different timestamps produces the right order.
          TS=$(date -u +"%Y%m%d%H%M%S")

          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ts=${TS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          build-contexts: ${{ matrix.build_contexts || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          # Skip SLSA provenance + SBOM attestations so each push
          # produces a single image manifest per tag (two tags total:
          # versioned + full-sha). Without this, buildx creates an
          # extra unnamed attestation manifest alongside every tag,
          # doubling the artifacts visible under ghcr's package view.
          provenance: false
          sbom: false
          # Commit identity travels with the image as OCI manifest
          # labels rather than baked build-time `ARG`s. Labels survive
          # `release-retag.yaml`'s digest-promotion (aliasing a
          # `sha-<full>` manifest as `vX.Y.Z`/`latest` without
          # rebuilding), so `docker buildx imagetools inspect` always
          # recovers the exact commit an image was built from,
          # regardless of which tag it is pulled under.
          #
          # The runtime-displayable version strings surfaced by the
          # admin UI / `/api/admin/version` / `/version` endpoint are
          # rendered at deploy time by the Helm charts from
          # `.Values.image.tag` (see `charts/backend/templates/
          # deployment.yaml`, `charts/frontend/files/
          # default.conf.template`, `charts/backup/templates/
          # version-configmap.yaml`). This keeps a retag-promoted
          # production image reporting a clean `<ver>` string while
          # the main-build image in the `latest` env renders its
          # `<ver>-rc.<short>` identity, even though the two are the
          # same underlying digest.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.next }}-rc.${{ steps.version.outputs.short }}
          # Tag order matters for how ghcr renders the "tags" list on
          # each image version card — the last tag in this list is
          # treated as the most recent by ghcr and surfaces first in
          # the UI. Put the immutable `sha-<fullsha>` tag first and
          # the human-meaningful `<ver>-rc.<ts>.<short>` rc tag last
          # so the rc tag is what shows up at a glance.
          #
          # Primary tag schema: `<nextComputedVersion>-rc.<ts>.<short>`
          # e.g. `1.1.18-rc.20260414194220.b286051`. This is a valid
          # SemVer prerelease (`-rc.<num>.<alnum>`) so tooling that
          # expects semver (Helm, ArgoCD, Flux OCIRepository semver
          # range) still parses it. Flux ImagePolicy in flux-fleet
          # extracts the 14-char `<ts>` for numerical ordering.
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}:${{ steps.version.outputs.next }}-rc.${{ steps.version.outputs.ts }}.${{ steps.version.outputs.short }}
