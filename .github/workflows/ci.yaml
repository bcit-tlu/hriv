name: '[CI] Test, build & publish'

# PR runs show PR title; main runs show head commit subject.
run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('PR #{0} — {1}', github.event.pull_request.number, github.event.pull_request.title)
      || format('Head build — {0}', github.event.head_commit.message) }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Default to least privilege; jobs elevate only when needed.
permissions:
  contents: read

jobs:
  # Quality gates

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry

      - name: Configure in-project virtualenv
        run: poetry config virtualenvs.in-project true

      - uses: actions/cache@v5
        with:
          path: backend/.venv
          key: backend-venv-py3.13-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: backend-venv-py3.13-

      - name: Install dependencies
        run: poetry install --with dev

      # Coverage gate (≥ 80 %) enforced via addopts in pyproject.toml.
      - name: Run pytest with coverage
        run: poetry run pytest

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: frontend-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: frontend-npm-

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      # Fails if the committed THIRD-PARTY-LICENSES.txt drifts from the
      # production dependency tree (run `npm run licenses:generate` to refresh).
      - name: Verify third-party license notices
        run: npm run licenses:check

      # Advisory until pre-existing lint errors are resolved.
      - name: Lint (ESLint)
        continue-on-error: true
        run: npm run lint

      # Coverage thresholds enforced via vite.config.ts.
      - name: Test with coverage (Vitest)
        run: npm run test:coverage

  synthetic-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: synthetic-monitoring
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: synthetic-npm-${{ hashFiles('synthetic-monitoring/package-lock.json') }}
          restore-keys: synthetic-npm-

      - name: Install dependencies
        run: npm ci

      - name: Type-check journeys (tsc)
        run: npm run typecheck

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform

      - name: Cache kubeconform schemas
        uses: actions/cache@v5
        with:
          path: /tmp/kubeconform-cache
          key: kubeconform-schemas-v0.6.7-${{ hashFiles('charts/**/Chart.yaml') }}
          restore-keys: |
            kubeconform-schemas-v0.6.7-

      - name: Lint all charts
        run: |
          for chart in charts/*/; do
            helm lint "$chart"
          done

      # kubeconform schema downloads from raw.githubusercontent.com can be flaky
      # on shared runners. Cache the schemas across runs to reduce network
      # dependence and keep the strict helm lint above as the primary gate while
      # schema validation absorbs the remaining transient-download risk.
      - name: Validate rendered charts with kubeconform
        continue-on-error: true
        run: |
          mkdir -p /tmp/kubeconform-cache
          for chart in charts/*/; do
            name=$(basename "$chart")
            echo "::group::${name}"
            helm template test "$chart" \
              | kubeconform -cache /tmp/kubeconform-cache -strict -summary \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                  -ignore-missing-schemas
            echo "::endgroup::"
          done

      - name: Run Helm chart regression checks
        run: bash scripts/test-helm-chart-regressions.sh

  # Container image builds (reusable workflow)

  build-frontend:
    needs: [frontend-checks]
    uses: bcit-tlu/.github/.github/workflows/oci-build.yaml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: read
    with:
      component: frontend
      image_name: hriv-frontend
      context: ./frontend
      target: stable
      build_contexts: 'nginx-config=./charts/frontend/files'
      extra_watch_paths: ./charts/frontend/files
      trivyignore: .trivyignore
    secrets: inherit

  build-backend:
    needs: [backend-tests]
    uses: bcit-tlu/.github/.github/workflows/oci-build.yaml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: read
    with:
      component: backend
      image_name: hriv-backend
      context: ./backend
      target: stable
      trivyignore: .trivyignore
    secrets: inherit

  build-backup:
    needs: [backend-tests]
    uses: bcit-tlu/.github/.github/workflows/oci-build.yaml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: read
    with:
      component: backup
      image_name: hriv-backup
      context: ./backup
      target: stable
      trivyignore: .trivyignore
    secrets: inherit

  build-synthetic-monitoring:
    needs: [synthetic-checks]
    uses: bcit-tlu/.github/.github/workflows/oci-build.yaml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: read
    with:
      component: synthetic-monitoring
      image_name: hriv-synthetic-monitoring
      context: ./synthetic-monitoring
      trivyignore: .trivyignore
    secrets: inherit

  # Helm chart publish (main push only; release publish in helm-publish.yaml).
  # Synthetic monitoring has no Helm chart, so it is intentionally absent from
  # the publish loop below.

  helm-publish:
    needs: [helm-lint, build-frontend, build-backend, build-backup]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - uses: sigstore/cosign-installer@v3

      - name: Cosign login (OCI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | \
            cosign login "${REGISTRY}" \
            -u "${ACTOR}" \
            --password-stdin

      - name: Helm login (OCI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | \
            helm registry login "${REGISTRY}" \
            -u "${ACTOR}" \
            --password-stdin

      - name: Package, push & sign charts
        shell: bash
        env:
          FRONTEND_VERSION: ${{ needs.build-frontend.outputs.rc_version }}
          BACKEND_VERSION: ${{ needs.build-backend.outputs.rc_version }}
          BACKUP_VERSION: ${{ needs.build-backup.outputs.rc_version }}
          OCI_BASE: oci://${{ env.REGISTRY }}/${{ github.repository }}/charts
          IMAGE_BASE: ${{ env.REGISTRY }}/${{ github.repository }}/charts
        run: |
          set -euo pipefail

          declare -A VERSIONS=(
            [frontend]="${FRONTEND_VERSION}"
            [backend]="${BACKEND_VERSION}"
            [backup]="${BACKUP_VERSION}"
          )

          for component in frontend backend backup; do
            VERSION="${VERSIONS[$component]}"
            if [[ -z "${VERSION}" ]]; then
              echo "No RC version for ${component} (no changes); skipping."
              continue
            fi

            CHART_DIR="charts/${component}"
            CHART_NAME=$(yq '.name' "${CHART_DIR}/Chart.yaml")
            DEST_DIR="/tmp/charts"
            mkdir -p "${DEST_DIR}"

            echo "::group::${CHART_NAME} ${VERSION}"

            helm dependency update "${CHART_DIR}" || true

            helm package "${CHART_DIR}" \
              --version "${VERSION}" \
              --app-version "${VERSION}" \
              -d "${DEST_DIR}"

            PUSH_OUT=$(helm push \
              "${DEST_DIR}/${CHART_NAME}-${VERSION}.tgz" \
              "${OCI_BASE}" 2>&1) || { echo "${PUSH_OUT}"; exit 1; }
            echo "${PUSH_OUT}"

            # Tolerant digest parse: case-insensitive, allows leading whitespace.
            DIGEST=$(printf '%s\n' "${PUSH_OUT}" \
              | awk 'tolower($1)=="digest:"{print $2; exit}')
            if [[ -z "${DIGEST}" ]]; then
              echo "::error::helm push for ${CHART_NAME} succeeded but no digest found in output"
              exit 1
            fi

            cosign sign --yes "${IMAGE_BASE}/${CHART_NAME}@${DIGEST}"

            echo "::endgroup::"
          done
