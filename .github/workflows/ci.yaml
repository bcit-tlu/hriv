name: CI – test, build & publish

on:
  push:
    branches: [main]
    tags: ["frontend-v*", "backend-v*", "backup-v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write
  id-token: write          # Cosign keyless (Sigstore OIDC)
  security-events: write   # Trivy SARIF upload to GitHub Security tab

jobs:
  # ── Quality gates ─────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run pytest
        run: poetry run pytest

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform

      - name: Lint, template-render & validate all charts
        run: |
          for chart in charts/*/; do
            name=$(basename "$chart")
            echo "::group::${name}"
            helm lint "$chart"
            helm template test "$chart" \
              | kubeconform -strict -summary \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                  -ignore-missing-schemas
            echo "::endgroup::"
          done

  # ── Compute per-component versions once (see issue #102) ──
  # Centralising this guarantees the rc timestamp embedded in the app-image
  # tag matches the chart's appVersion for the same commit, even though the
  # images and helm-publish jobs run at different wall-clock times.
  versions:
    runs-on: ubuntu-latest
    outputs:
      json: ${{ steps.compute.outputs.json }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # need full history + tags for rc version derivation
      - name: Compute component versions
        id: compute
        shell: bash
        # Release tag push (<component>-v<X.Y.Z>) → VERSION = X.Y.Z, is_release=true
        # Any other ref                          → VERSION = <last reachable stable>-rc.<UTC YYYYMMDDHHMMSS>.<sha7>
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TS="$(date -u +%Y%m%d%H%M%S)"
          TAG_REF="${GITHUB_REF#refs/tags/}"
          OUT='{}'
          for COMPONENT in frontend backend backup; do
            if [[ "${GITHUB_REF}" == refs/tags/* && "${TAG_REF}" =~ ^${COMPONENT}-v(.+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
              IS_RELEASE=true
            else
              BASE_TAG="$(git tag -l "${COMPONENT}-v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname --merged HEAD | head -n1 || true)"
              BASE="${BASE_TAG#${COMPONENT}-v}"
              [[ -z "${BASE}" ]] && BASE="0.0.0"
              VERSION="${BASE}-rc.${TS}.${SHORT_SHA}"
              IS_RELEASE=false
            fi
            OUT="$(jq -c --arg c "${COMPONENT}" --arg v "${VERSION}" --argjson r "${IS_RELEASE}" \
              '. + {($c): {version: $v, is_release: $r}}' <<<"${OUT}")"
            echo "  ${COMPONENT}: ${VERSION} (release=${IS_RELEASE})"
          done
          echo "json=${OUT}" >> "$GITHUB_OUTPUT"

  # ── Container images (matrix: frontend, backend, backup) ──
  images:
    runs-on: ubuntu-latest
    needs: [backend-tests, versions]
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            context: ./frontend
            target: prod
          - component: backend
            context: ./backend
            target: prod
          - component: backup
            context: ./backup
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish ONLY the tags defined in issue #102 — no raw SHA, branch name, etc.
      # Release:          X.Y.Z, stable, latest
      # Non-release:      latest, X.Y.Z-rc.<TS>.<SHA>
      # Version + is_release come from the shared `versions` job so the tag
      # stamped on the image matches the chart's appVersion byte-for-byte.
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}
          tags: |
            type=raw,value=${{ fromJSON(needs.versions.outputs.json)[matrix.component].version }}
            type=raw,value=stable,enable=${{ fromJSON(needs.versions.outputs.json)[matrix.component].is_release }}
            type=raw,value=latest
          flavor: |
            latest=false

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          build-args: |
            VITE_APP_VERSION=${{ fromJSON(needs.versions.outputs.json)[matrix.component].version }}

      # ── Sign with Cosign (keyless / Sigstore) ──────────────
      - uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'

      - name: Sign image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}@${{ steps.build.outputs.digest }}

      # ── Trivy vulnerability scan → GitHub Security tab ─────
      - name: Scan image for vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload scan results to GitHub Security
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}

  # ── Helm charts → OCI registry ────────────────────────────
  helm-publish:
    runs-on: ubuntu-latest
    needs: [helm-lint, images, versions]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - uses: sigstore/cosign-installer@v3

      - uses: imjasonh/setup-crane@v0.5
        # crane is used to attach the `latest` / `stable` moving tags to the
        # same OCI digest that `helm push` produces, without repackaging.

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              -u ${{ github.actor }} --password-stdin

      # Chart OCI tag schema (per issue #102, mirrored from app images):
      #   Release tag push  (<chart>-v<X.Y.Z>) → X.Y.Z, stable, latest
      #   Non-release push  (main, etc.)      → latest, <last-reachable-stable>-rc.<UTC YYYYMMDDHHMMSS>.<sha7>
      # Version + is_release come from the shared `versions` job so chart
      # appVersion matches the app image tag byte-for-byte for the same commit.
      - name: Package, push, tag & sign charts
        shell: bash
        env:
          VERSIONS_JSON: ${{ needs.versions.outputs.json }}
        run: |
          set -euo pipefail
          OCI_BASE="oci://${{ env.REGISTRY }}/${{ github.repository }}/charts"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ github.repository }}/charts"

          for dir in charts/*/; do
            chart=$(basename "$dir")      # e.g. frontend
            echo "::group::${chart}"

            VERSION="$(jq -r --arg c "${chart}" '.[$c].version' <<<"${VERSIONS_JSON}")"
            IS_RELEASE="$(jq -r --arg c "${chart}" '.[$c].is_release' <<<"${VERSIONS_JSON}")"
            [[ -n "${VERSION}" && "${VERSION}" != "null" ]] || { echo "No version for chart ${chart}" >&2; exit 1; }

            # Stamp version into Chart.yaml so the packaged chart matches the tag.
            sed -i "s/^version:.*/version: ${VERSION}/" "${dir}Chart.yaml"
            sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${dir}Chart.yaml"

            helm package "$dir" -d /tmp/charts
            PUSH_OUT=$(helm push "/tmp/charts/hriv-${chart}-${VERSION}.tgz" "${OCI_BASE}" 2>&1)
            echo "${PUSH_OUT}"

            DIGEST=$(printf '%s\n' "${PUSH_OUT}" | awk '/^Digest:/{print $2}')
            [[ -n "${DIGEST}" ]] || { echo "Failed to capture digest from helm push" >&2; exit 1; }

            # Attach moving tags to the same digest (no repackage → identical content).
            crane tag "${IMAGE_BASE}/hriv-${chart}:${VERSION}" latest
            if [[ "${IS_RELEASE}" == "true" ]]; then
              crane tag "${IMAGE_BASE}/hriv-${chart}:${VERSION}" stable
            fi

            cosign sign --yes "${IMAGE_BASE}/hriv-${chart}@${DIGEST}"

            echo "::endgroup::"
          done
