name: CI

on:
  push:
    branches: [main]
    tags: ["frontend-v*", "backend-v*", "backup-v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  # ── Compute per-component version + mode ─────────────────
  versions:
    runs-on: ubuntu-latest
    outputs:
      json: ${{ steps.compute.outputs.json }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute publish plan
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_REF="${GITHUB_REF#refs/tags/}"
          OUT='{}'

          for COMPONENT in frontend backend backup; do
            MODE="skip"
            VERSION=""

            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              # Tag push: only the matching component builds.
              if [[ "${TAG_REF}" =~ ^${COMPONENT}-v(.+)$ ]]; then
                MODE="release"
                VERSION="${BASH_REMATCH[1]}"
              fi
            elif [[ "${GITHUB_EVENT_NAME}" == "push" \
                 || ( "${GITHUB_EVENT_NAME}" == "workflow_dispatch" \
                   && "${GITHUB_REF}" == "refs/heads/main" ) ]]; then
              MODE="head"
              VERSION=$(jq -r --arg c "${COMPONENT}" '.[$c]' .release-please-manifest.json)
            else
              # PR build: build but don't push.
              MODE="pr"
              VERSION="0.0.0-pr.${SHORT_SHA}"
            fi

            OUT=$(jq -c \
              --arg c "${COMPONENT}" \
              --arg mode "${MODE}" \
              --arg v "${VERSION}" \
              '. + {($c): {mode: $mode, version: $v}}' \
              <<<"${OUT}")

            echo "  ${COMPONENT}: mode=${MODE} version=${VERSION}"
          done

          echo "json=${OUT}" >> "$GITHUB_OUTPUT"

  # ── App images (matrix: frontend, backend, backup) ───────
  images:
    runs-on: ubuntu-latest
    needs: [versions]
    if: needs.versions.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            context: ./frontend
            target: prod
            build_contexts: |
              nginx-config=charts/frontend/files
          - component: backend
            context: ./backend
            target: prod
          - component: backup
            context: ./backup
    steps:
      - name: Skip non-matching components on tag pushes
        if: fromJSON(needs.versions.outputs.json)[matrix.component].mode == 'skip'
        run: echo "Skipping ${{ matrix.component }}"

      - uses: actions/checkout@v6
        if: fromJSON(needs.versions.outputs.json)[matrix.component].mode != 'skip'

      - uses: docker/setup-buildx-action@v4
        if: fromJSON(needs.versions.outputs.json)[matrix.component].mode != 'skip'

      - uses: docker/login-action@v4
        if: fromJSON(needs.versions.outputs.json)[matrix.component].mode != 'skip' && github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        if: fromJSON(needs.versions.outputs.json)[matrix.component].mode != 'skip'
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}
          tags: |
            type=raw,value=${{ fromJSON(needs.versions.outputs.json)[matrix.component].version }},enable=${{ fromJSON(needs.versions.outputs.json)[matrix.component].mode != 'skip' }}
            type=raw,value=head,enable=${{ fromJSON(needs.versions.outputs.json)[matrix.component].mode == 'head' }}
          flavor: |
            latest=false

      - uses: docker/build-push-action@v7
        if: fromJSON(needs.versions.outputs.json)[matrix.component].mode != 'skip'
        with:
          context: ${{ matrix.context }}
          build-contexts: ${{ matrix.build_contexts }}
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          build-args: |
            VITE_APP_VERSION=${{ fromJSON(needs.versions.outputs.json)[matrix.component].version }}
            APP_VERSION=${{ fromJSON(needs.versions.outputs.json)[matrix.component].version }}

  # ── Helm charts → OCI registry ───────────────────────────
  helm-publish:
    runs-on: ubuntu-latest
    needs: [images, versions]
    if: >-
      !cancelled()
      && needs.versions.result == 'success'
      && needs.images.result == 'success'
      && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              -u ${{ github.actor }} --password-stdin

      - name: Package & push charts
        env:
          PLAN_JSON: ${{ needs.versions.outputs.json }}
        run: |
          set -euo pipefail
          OCI_BASE="oci://${{ env.REGISTRY }}/${{ github.repository }}/charts"

          for dir in charts/*/; do
            chart=$(basename "$dir")
            echo "::group::${chart}"

            MODE=$(jq -r --arg c "${chart}" '.[$c].mode' <<<"${PLAN_JSON}")
            VERSION=$(jq -r --arg c "${chart}" '.[$c].version' <<<"${PLAN_JSON}")

            if [[ "${MODE}" == "skip" || "${MODE}" == "pr" ]]; then
              echo "Skipping ${chart} (mode=${MODE})"
              echo "::endgroup::"
              continue
            fi

            # Stamp chart version and appVersion to match the release version.
            sed -i "s/^version:.*/version: ${VERSION}/" "${dir}Chart.yaml"
            sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${dir}Chart.yaml"

            helm package "$dir" -d /tmp/charts
            helm push "/tmp/charts/hriv-${chart}-${VERSION}.tgz" "${OCI_BASE}"

            echo "::endgroup::"
          done
