name: build

on:
  push:
    branches: [main]
  # Scope PR runs to PRs targeting `main` only; bare `pull_request:` fires
  # for PRs against any base branch, which isn't what this workflow is
  # meant to gate.
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

# Least-privilege default: only read access at the workflow level.
# Jobs that push to GHCR elevate `packages: write` locally.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # `packages: write` is required for `docker login ghcr.io` + push;
    # scoped to this job so PR runs never use it even though they share
    # the same build step (push: false on pull_request events).
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            context: ./frontend
            target: stable
            build_contexts: |
              nginx-config=./charts/frontend/files
            extra_watch_paths: ./charts/frontend/files
          - component: backend
            context: ./backend
            target: stable
          - component: backup
            context: ./backup
            target: stable

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # `github.event.before` is the all-zeroes SHA on first pushes
          # to a new ref (and occasionally missing from the local clone
          # on force-pushes / history edits). Fall back to HEAD~1 when
          # available so `git diff` doesn't abort the job; if HEAD has
          # no parent (initial commit), treat everything as changed.
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [[ -z "${BASE}" || "${BASE}" == "${ZERO_SHA}" ]] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            if git rev-parse --verify "${HEAD}^" >/dev/null 2>&1; then
              BASE="${HEAD}^"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if git diff --quiet "${BASE}" "${HEAD}" -- ${{ matrix.context }} ${{ matrix.extra_watch_paths }}; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.changes.outputs.changed == 'true'

      - uses: docker/login-action@v4
        if: steps.changes.outputs.changed == 'true' && github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          COMPONENT=${{ matrix.component }}

          TAG=$(git describe --tags \
            --match "${COMPONENT}-v*" \
            --exclude "${COMPONENT}-v*-*" \
            --abbrev=0 2>/dev/null || true)
          if [[ -z "$TAG" ]]; then
            VERSION="0.0.0"
            RANGE="HEAD"
          else
            VERSION="${TAG#${COMPONENT}-v}"
            RANGE="${TAG}..HEAD"
          fi

          if ! [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Refusing to bump from non-semver base version '${VERSION}' (tag '${TAG}')"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          SUBJECTS=$(git log "${RANGE}" --pretty=format:"%s" -- ${{ matrix.context }})
          BODIES=$(git log "${RANGE}" --pretty=format:"%b" -- ${{ matrix.context }})

          if echo "$SUBJECTS" | grep -qE "^[a-zA-Z]+(\([^)]+\))?!:" \
             || echo "$BODIES" | grep -qE "^BREAKING[ -]CHANGE:"; then
            ((MAJOR+=1)); MINOR=0; PATCH=0
          elif echo "$SUBJECTS" | grep -qE "^feat(\(.+\))?:"; then
            ((MINOR+=1)); PATCH=0
          else
            ((PATCH+=1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Numerical timestamp suffix used by Flux ImagePolicy
          # (extract=numerical) to sort `latest`-env images by build
          # recency. Keeping it in the primary tag lets Flux pick the
          # newest image unambiguously even across re-runs of the same
          # commit.
          TS=$(date -u +"%Y%m%d%H%M%S")

          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ts=${TS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          build-contexts: ${{ matrix.build_contexts || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          # Skip SLSA provenance + SBOM attestations so each push
          # produces a single image manifest per tag (two tags total:
          # versioned + full-sha). Without this, buildx creates an
          # extra unnamed attestation manifest alongside every tag,
          # doubling the artifacts visible under ghcr's package view.
          provenance: false
          sbom: false
          # Stamp the computed version into the image so
          # `/api/admin/version` (backend) and the admin panel
          # (frontend, via VITE_APP_VERSION) report the real build
          # version instead of the `dev` ARG default. backup/Dockerfile
          # also carries APP_VERSION for docker/kubectl inspect parity.
          build-args: |
            APP_VERSION=${{ steps.version.outputs.next }}
            VITE_APP_VERSION=${{ steps.version.outputs.next }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}:${{ steps.version.outputs.next }}-${{ steps.version.outputs.short }}.${{ steps.version.outputs.ts }}
            ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}:sha-${{ github.sha }}
