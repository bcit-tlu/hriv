name: '[CI] Apply PR 984 review fixes'

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-review-fixes:
    if: github.head_ref == 'agent/fix-fabric-textbox-resizing' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/fix-fabric-textbox-resizing
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply review fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path('frontend/src/components/CanvasOverlay.tsx')
          source = source_path.read_text()
          source_replacements = [
              (
                  "const lines = wrapCanvasText(ctx, text, Math.abs(pw))",
                  "const lines = wrapCanvasText(ctx, text, Math.max(MIN_TEXTBOX_WIDTH, Math.abs(pw)))",
              ),
              (
                  "        const aObj = text as AnnotatedObject\n",
                  "        text.set({ height: Math.max(1, Math.abs(ph)) })\n        const aObj = text as AnnotatedObject\n",
              ),
          ]
          for old, new in source_replacements:
              if source.count(old) != 1:
                  raise SystemExit(f'Expected one source match for {old!r}, found {source.count(old)}')
              source = source.replace(old, new, 1)
          source_path.write_text(source)

          test_path = Path('frontend/tests/components/CanvasOverlay.test.tsx')
          tests = test_path.read_text()
          test_replacements = [
              (
                  "    this.set = vi.fn()\n    this.controls = createObjectDefaultControls()\n",
                  "    this.set = vi.fn((values: Record<string, unknown>) => Object.assign(this, values))\n    this.controls = createObjectDefaultControls()\n",
              ),
              (
                  "      const initialScaleY = text.scaleY ?? 1\n      text.controls.mb.actionHandler({}, { target: text }, 0, 260)\n      expect(text.height).toBe(260)\n      expect(text.scaleY ?? 1).toBe(initialScaleY)\n",
                  "      const initialScaleY = text.scaleY ?? 1\n      text.controls.mt.actionHandler({}, { target: text }, 0, -220)\n      expect(text.height).toBe(220)\n      expect(text.scaleY ?? 1).toBe(initialScaleY)\n\n      text.controls.mb.actionHandler({}, { target: text }, 0, 260)\n      expect(text.height).toBe(260)\n      expect(text.scaleY ?? 1).toBe(initialScaleY)\n",
              ),
              (
                  "      expect(text.width).toBe(250)\n      expect(text.controls.mt.actionHandler).toBe(fabric.controlsUtils.changeHeight)\n",
                  "      expect(text.width).toBe(250)\n      expect(text.height).toBe(50)\n      expect(text.controls.mt.actionHandler).toBe(fabric.controlsUtils.changeHeight)\n",
              ),
          ]
          for old, new in test_replacements:
              if tests.count(old) != 1:
                  raise SystemExit(f'Expected one test match for {old!r}, found {tests.count(old)}')
              tests = tests.replace(old, new, 1)
          test_path.write_text(tests)
          PY

          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yaml
          rm -f .github/workflows/apply-pr-984-review-round-2.yml

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npx prettier --write src/components/CanvasOverlay.tsx tests/components/CanvasOverlay.test.tsx
          npm run format:check
          npm test -- --run tests/components/CanvasOverlay.test.tsx
          npm run build

      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/src/components/CanvasOverlay.tsx frontend/tests/components/CanvasOverlay.test.tsx .github/workflows/ci.yaml .github/workflows/apply-pr-984-review-round-2.yml
          git commit -m 'Preserve text box dimensions across modes'
          git push origin HEAD:agent/fix-fabric-textbox-resizing
