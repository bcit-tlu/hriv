name: Apply issue 974 fix

on:
  push:
    branches:
      - agent/fix-fabric-textbox-resizing

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and validate fix
        shell: bash
        run: |
          cat > /tmp/issue-974.patch <<'PATCH'
          --- a/frontend/src/components/CanvasOverlay.tsx
