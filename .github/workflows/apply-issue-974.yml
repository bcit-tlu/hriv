          git apply /tmp/issue-974.patch
          rm .github/workflows/apply-issue-974.yml
          cd frontend
          npm ci --ignore-scripts
          npm test -- --run tests/components/CanvasOverlay.test.tsx
          npm run build
          cd ..

      - name: Commit fix
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/src/components/CanvasOverlay.tsx frontend/tests/components/CanvasOverlay.test.tsx .github/workflows/apply-issue-974.yml
          git commit -m 'Fix Fabric text box resizing'
          git push
