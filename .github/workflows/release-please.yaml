name: release-please

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Default to least privilege; jobs elevate only when needed.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released: ${{ steps.rp.outputs.paths_released }}
      outputs: ${{ toJSON(steps.rp.outputs) }}
    steps:
      # A dedicated token (PAT or GitHub App) is required so that the
      # PR push triggers downstream workflows (ci.yaml, pr-title-lint).
      # GITHUB_TOKEN is deliberately NOT used here — its anti-recursion
      # guard silently prevents other workflows from running on the PR,
      # leaving branch-protection checks unsatisfied.
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      # `release-as` is one-shot. Once manifest catches up, remove it;
      # otherwise future semver bumps are pinned and releases stall.
      - uses: actions/checkout@v6
        if: steps.rp.outputs.releases_created != 'true'
      - name: Guard against stale `release-as` entries
        if: steps.rp.outputs.releases_created != 'true'
        run: |
          python3 - <<'PY'
          import json, sys
          with open("release-please-config.json") as f:
              cfg = json.load(f)
          with open(".release-please-manifest.json") as f:
              manifest = json.load(f)
          stale = []
          for pkg, conf in cfg.get("packages", {}).items():
              ra = conf.get("release-as")
              if ra is not None and manifest.get(pkg) == ra:
                  stale.append((pkg, ra))
          if stale:
              print("::error::Stale `release-as` entries in release-please-config.json:")
              for pkg, ra in stale:
                  print(f"::error::  packages.{pkg}.release-as={ra} already matches .release-please-manifest.json — remove this field so release-please can resume normal semver bumps.")
              sys.exit(1)
          PY

  # Enable auto-merge so release PRs land without manual intervention.
  # Prerequisite: enable "Allow auto-merge" in repo Settings → General.
  auto-merge:
    needs: release
    if: needs.release.outputs.releases_created != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge on open release-please PRs
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          prs=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("release-please--")) | .number')

          for pr_num in $prs; do
            echo "Enabling auto-merge on PR #${pr_num}"
            if ! output=$(gh pr merge "$pr_num" --auto --squash --repo "$GITHUB_REPOSITORY" 2>&1); then
              echo "::warning::auto-merge failed for PR #${pr_num}: ${output}"
            fi
          done

  # Dispatch helm-publish and release-retag for each released tag.
  dispatch-publish:
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch downstream workflows for each released tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RP_OUTPUTS: ${{ needs.release.outputs.outputs }}
          PATHS_RELEASED: ${{ needs.release.outputs.paths_released }}
        run: |
          set -euo pipefail
          for path in $(jq -r '.[]' <<<"${PATHS_RELEASED}"); do
            tag=$(jq -r --arg key "${path}--tag_name" '.[$key] // empty' <<<"${RP_OUTPUTS}")
            if [[ -z "${tag}" ]]; then
              echo "::warning::No tag_name output for path '${path}', skipping"
              continue
            fi
            echo "Dispatching helm-publish.yaml for ${tag}"
            gh workflow run helm-publish.yaml \
              --ref "${tag}" \
              -f tag_name="${tag}"
            echo "Dispatching release-retag.yaml for ${tag}"
            gh workflow run release-retag.yaml \
              --ref "${tag}" \
              -f tag_name="${tag}"
          done
