name: release-please

on:
  push:
    branches: [main]

# Least-privilege default: only `checkout` needs read access.
# Each job elevates permissions to just what that job requires.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # release-please creates/updates release PRs, tags, GitHub releases
    # and comments on associated issues.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released: ${{ steps.rp.outputs.paths_released }}
      outputs: ${{ toJSON(steps.rp.outputs) }}
    steps:
      # Manifest mode is inferred from the presence of
      # `release-please-config.json` + `.release-please-manifest.json`;
      # the top-level `release-type` input only accepts the leaf values
      # (ruby|python|node|terraform-module) and must be omitted here so
      # each component's `release-type` from the config drives the
      # per-package strategy.
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # `release-as` per-package is a one-shot: once the release PR it
      # triggered has merged and the manifest has caught up, the override
      # must be removed, otherwise every subsequent release-please run
      # keeps pinning the same version and blocks normal semver bumps
      # from feat:/fix: commits. This guard runs *after* release-please
      # and is skipped whenever `releases_created=true`, so the
      # tag/release finalization that happens on the merge-of-chore-PR
      # push (where manifest has just caught up to release-as) isn't
      # blocked. On any subsequent push where the state is still stale
      # and there's nothing to release, the workflow fails loudly to
      # force the cleanup PR.
      - uses: actions/checkout@v6
        if: steps.rp.outputs.releases_created != 'true'
      - name: Guard against stale `release-as` entries
        if: steps.rp.outputs.releases_created != 'true'
        run: |
          python3 - <<'PY'
          import json, sys
          with open("release-please-config.json") as f:
              cfg = json.load(f)
          with open(".release-please-manifest.json") as f:
              manifest = json.load(f)
          stale = []
          for pkg, conf in cfg.get("packages", {}).items():
              ra = conf.get("release-as")
              if ra is not None and manifest.get(pkg) == ra:
                  stale.append((pkg, ra))
          if stale:
              print("::error::Stale `release-as` entries in release-please-config.json:")
              for pkg, ra in stale:
                  print(f"::error::  packages.{pkg}.release-as={ra} already matches .release-please-manifest.json — remove this field so release-please can resume normal semver bumps.")
              sys.exit(1)
          PY

  # ── Status checks for release-please PRs ──────────────────
  #
  # release-please creates PRs with GITHUB_TOKEN, which means the
  # `pull_request`-triggered CI workflow (ci.yaml) never fires on them.
  # The `pull_request_target`-triggered pr-title-lint workflow is also
  # gated behind "Require approval for first-time contributors", so its
  # `lint` check never appears either.  Branch protection requires these
  # checks before merging.  Since release-please PRs only modify version
  # files and changelogs (the code was already tested when it landed on
  # main), we create passing check-runs directly.
  #
  # This job must run unconditionally (not gated on releases_created)
  # because in a monorepo with `separate-pull-requests: true`, releasing
  # one component rebases sibling release PRs to a new HEAD SHA,
  # invalidating any check-runs that existed on the old SHA.
  set-pr-checks:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: read
    steps:
      - name: Create passing CI checks on open release-please PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Required status checks that ci.yaml / pr-title-lint normally
          # provide.  Keep in sync with the repo's branch-protection rules.
          REQUIRED_CHECKS=(backend-tests frontend-checks helm-lint lint)

          mapfile -t prs < <(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --author 'github-actions[bot]' \
              --json number,headRefOid,headRefName \
              --jq '.[] | select(.headRefName | startswith("release-please--")) | "\(.number)\t\(.headRefOid)"'
          )

          if [[ ${#prs[@]} -eq 0 || -z "${prs[0]}" ]]; then
            echo "No open release-please PRs found; nothing to do."
            exit 0
          fi

          for entry in "${prs[@]}"; do
            IFS=$'\t' read -r pr_num sha <<< "$entry"
            echo "::group::PR #${pr_num} (${sha:0:7})"
            for check in "${REQUIRED_CHECKS[@]}"; do
              jq -n \
                --arg name "$check" \
                --arg sha "$sha" \
                '{
                  name: $name,
                  head_sha: $sha,
                  status: "completed",
                  conclusion: "success",
                  output: {
                    title: "Skipped for release-please PR",
                    summary: "Release-please PRs only modify version files and changelogs. The underlying code was already tested when it landed on main."
                  }
                }' | gh api "repos/${GITHUB_REPOSITORY}/check-runs" --input -
              echo "  ✓ ${check}"
            done
            echo "::endgroup::"
          done

  # Releases created via GITHUB_TOKEN do NOT trigger workflows that listen
  # on `release: published` or `push: tags:`. Dispatch helm-publish and
  # release-retag explicitly for each released tag.
  dispatch-publish:
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch downstream workflows for each released tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RP_OUTPUTS: ${{ needs.release.outputs.outputs }}
          PATHS_RELEASED: ${{ needs.release.outputs.paths_released }}
        run: |
          set -euo pipefail
          for path in $(jq -r '.[]' <<<"${PATHS_RELEASED}"); do
            tag=$(jq -r --arg key "${path}--tag_name" '.[$key] // empty' <<<"${RP_OUTPUTS}")
            if [[ -z "${tag}" ]]; then
              echo "::warning::No tag_name output for path '${path}', skipping"
              continue
            fi
            echo "Dispatching helm-publish.yaml for ${tag}"
            gh workflow run helm-publish.yaml \
              --ref "${tag}" \
              -f tag_name="${tag}"
            echo "Dispatching release-retag.yaml for ${tag}"
            gh workflow run release-retag.yaml \
              --ref "${tag}" \
              -f tag_name="${tag}"
          done
