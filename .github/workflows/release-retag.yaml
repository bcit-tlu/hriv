name: release-images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to retag (e.g. frontend-v1.2.3)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  retag:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [frontend, backend, backup]

    steps:
      - name: Parse release tag
        id: parse
        env:
          TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
        run: |
          if [[ "$TAG" =~ ^${{ matrix.component }}-v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}" >> $GITHUB_OUTPUT
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        if: steps.parse.outputs.match == 'true'
        with:
          ref: ${{ inputs.tag_name || github.event.release.tag_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Check if this is the highest stable release
        id: highest
        if: steps.parse.outputs.match == 'true'
        shell: bash
        env:
          COMPONENT: ${{ matrix.component }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          # Highest stable (non-prerelease) semver tag for this component.
          HIGHEST=$(git tag -l "${COMPONENT}-v[0-9]*.[0-9]*.[0-9]*" \
            | sed "s/^${COMPONENT}-v//" \
            | grep -v -- '-' \
            | sort -V \
            | tail -n1)

          if [[ "${VERSION}" == "${HIGHEST}" ]]; then
            echo "is_highest=true" >> "$GITHUB_OUTPUT"
            echo "${VERSION} is the highest stable release for ${COMPONENT} — will tag as latest."
          else
            echo "is_highest=false" >> "$GITHUB_OUTPUT"
            echo "${VERSION} is NOT the highest stable release (highest: ${HIGHEST}) — skipping latest tag."
          fi

      - name: Resolve tag commit SHA
        if: steps.parse.outputs.match == 'true'
        id: sha
        env:
          TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
        run: |
          SHA=$(git rev-list -n1 "${TAG}")
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v4
        if: steps.parse.outputs.match == 'true'

      - uses: docker/login-action@v4
        if: steps.parse.outputs.match == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for source image
        if: steps.parse.outputs.match == 'true'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          SRC="${IMAGE}:sha-${SHA}"
          # Poll with exponential backoff until the sha-tagged image appears (up to ~30 min).
          DELAY=10
          MAX_DELAY=60
          DEADLINE=$(( $(date +%s) + 1800 ))
          while :; do
            if docker buildx imagetools inspect "${SRC}" >/dev/null 2>&1; then
              echo "Source image ${SRC} is available."
              break
            fi
            if [[ $(date +%s) -ge $DEADLINE ]]; then
              echo "::error::Timed out after 30m waiting for ${SRC} (CI build for $SHA did not publish)."
              exit 1
            fi
            echo "Source image ${SRC} not yet available; retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$(( DELAY * 2 ))
            if (( DELAY > MAX_DELAY )); then DELAY=$MAX_DELAY; fi
          done

      - name: Retag (no pull)
        id: retag
        if: steps.parse.outputs.match == 'true'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}
          SHA: ${{ steps.sha.outputs.sha }}
          VERSION: ${{ steps.parse.outputs.version }}
          IS_HIGHEST: ${{ steps.highest.outputs.is_highest }}
        run: |
          TAGS="-t ${IMAGE}:${VERSION}"
          if [[ "${IS_HIGHEST}" == "true" ]]; then
            TAGS="${TAGS} -t ${IMAGE}:latest"
          fi

          docker buildx imagetools create \
            ${TAGS} \
            ${IMAGE}:sha-${SHA}

          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3
        if: steps.parse.outputs.match == 'true'

      - name: Sign release image
        if: steps.parse.outputs.match == 'true' && steps.retag.outputs.digest != ''
        env:
          IMAGE: ${{ steps.retag.outputs.image }}
          DIGEST: ${{ steps.retag.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
