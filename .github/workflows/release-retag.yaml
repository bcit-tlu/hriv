name: release-images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to retag (e.g. frontend-v1.2.3)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  retag:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [frontend, backend, backup]

    steps:
      - name: Parse release tag
        id: parse
        env:
          TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
        run: |
          if [[ "$TAG" =~ ^${{ matrix.component }}-v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "match=true" >> $GITHUB_OUTPUT

            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            echo "major=$MAJOR" >> $GITHUB_OUTPUT
            echo "minor=$MINOR" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        if: steps.parse.outputs.match == 'true'
        with:
          ref: ${{ inputs.tag_name || github.event.release.tag_name }}

      - name: Resolve tag commit SHA
        if: steps.parse.outputs.match == 'true'
        id: sha
        env:
          TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
        run: |
          SHA=$(git rev-list -n1 "${TAG}")
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v4
        if: steps.parse.outputs.match == 'true'

      - uses: docker/login-action@v4
        if: steps.parse.outputs.match == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag (no pull)
        if: steps.parse.outputs.match == 'true'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ github.repository }}/hriv-${{ matrix.component }}
          SHA=${{ steps.sha.outputs.sha }}
          VERSION=${{ steps.parse.outputs.version }}
          MAJOR=${{ steps.parse.outputs.major }}
          MINOR=${{ steps.parse.outputs.minor }}

          docker buildx imagetools create \
            -t ${IMAGE}:${VERSION} \
            -t ${IMAGE}:${MAJOR}.${MINOR} \
            -t ${IMAGE}:${MAJOR} \
            -t ${IMAGE}:latest \
            ${IMAGE}:sha-${SHA}
