# ── Flux notification resources ──────────────────────────────
# Configure a webhook provider (Slack, Teams, generic) and an
# Alert that fires on HelmRelease events in the hriv namespace.
#
# To activate:
#   1. Create the webhook Secret:
#      kubectl -n hriv create secret generic notification-webhook \
#        --from-literal=address=https://hooks.slack.com/services/YOUR/WEBHOOK/URL
#   2. Apply this file (Flux will reconcile it automatically).
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: webhook
  namespace: hriv
spec:
  type: generic
  secretRef:
    name: notification-webhook
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: hriv-deployments
  namespace: hriv
spec:
  providerRef:
    name: webhook
  eventSeverity: info
  eventSources:
    - kind: HelmRelease
      name: "*"
      namespace: hriv
    - kind: HelmRepository
      name: hriv
      namespace: hriv
