apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hriv-backup
  namespace: hriv
spec:
  interval: 5m
  chart:
    spec:
      chart: hriv-backup
      # Accept any version including dev pre-releases (0.1.0-dev.*)
      version: ">=0.0.0-0"
      sourceRef:
        kind: HelmRepository
        name: hriv
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    vault:
      enabled: true
