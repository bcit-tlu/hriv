apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hriv-backend
  namespace: hriv
spec:
  interval: 5m
  chart:
    spec:
      chart: hriv-backend
      # Accept any version including dev pre-releases (0.1.0-dev.*)
      version: ">=0.0.0-0"
      sourceRef:
        kind: HelmRepository
        name: hriv
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    oidc:
      enabled: true
      redirectUri: "https://hriv.latest.ltc.bcit.ca/api/auth/oidc/callback"
      postLoginRedirect: "https://hriv.latest.ltc.bcit.ca"
      corsOrigins: "https://hriv.latest.ltc.bcit.ca"
    vault:
      enabled: true
