apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corgi.fullname" . }}-frontend
  labels:
    {{- include "corgi.labels" . | nindent 4 }}
    {{- include "corgi.frontend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "corgi.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "corgi.labels" . | nindent 8 }}
        {{- include "corgi.frontend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: {{ include "corgi.backend.url" . | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
