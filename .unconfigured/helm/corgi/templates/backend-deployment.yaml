apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corgi.fullname" . }}-backend
  labels:
    {{- include "corgi.labels" . | nindent 4 }}
    {{- include "corgi.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "corgi.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "corgi.labels" . | nindent 8 }}
        {{- include "corgi.backend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
            {{- if .Values.database.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "corgi.database.secretName" . }}
                  key: uri
            {{- else }}
              value: {{ required "backend.databaseUrl is required when database.enabled is false" .Values.backend.databaseUrl | quote }}
            {{- end }}
            - name: SOURCE_IMAGES_DIR
              value: "{{ .Values.backend.persistence.mountPath }}/source_images"
            - name: TILES_DIR
              value: "{{ .Values.backend.persistence.mountPath }}/tiles"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if .Values.backend.persistence.enabled }}
          volumeMounts:
            - name: image-data
              mountPath: {{ .Values.backend.persistence.mountPath }}
          {{- end }}
      {{- if .Values.backend.persistence.enabled }}
      volumes:
        - name: image-data
          persistentVolumeClaim:
            claimName: {{ include "corgi.fullname" . }}-image-data
      {{- end }}
