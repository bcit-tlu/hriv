# -- Global settings
nameOverride: ""
fullnameOverride: ""

# -- Frontend (nginx serving React SPA)
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/bcit-tlu/corgi-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # -- Backend URL injected into the nginx reverse-proxy config.
  # Defaults to the in-cluster backend Service; override only if the
  # backend lives outside this release.
  backendUrl: ""

# -- Backend (FastAPI / uvicorn)
backend:
  replicaCount: 1
  image:
    repository: ghcr.io/bcit-tlu/corgi-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # -- Direct DATABASE_URL value; required when database.enabled is false
  databaseUrl: ""
  persistence:
    # -- Enable a PVC for source images and generated tiles
    enabled: true
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 5Gi
    mountPath: /data

# -- CloudNative-PG PostgreSQL cluster
database:
  # -- Deploy a CloudNative-PG Cluster resource
  enabled: true
  instances: 1
  image: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    storageClass: longhorn
    size: 5Gi
  database: corgi
  owner: corgi
  seed:
    # -- Load demo seed data (users, categories, images) on first init
    enabled: true

# -- Ingress
ingress:
  enabled: false
  className: ""
  annotations:
    # Allow large image uploads through the ingress controller.
    # Without this the nginx ingress controller defaults to 1 MB,
    # which blocks pathology TIFF/SVS uploads.  0 = unlimited.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  hosts:
    - host: corgi.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: corgi-tls
  #    hosts:
  #      - corgi.local
